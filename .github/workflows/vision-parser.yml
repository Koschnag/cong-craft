name: Vision Parser

# Only on opened - NOT edited (to prevent duplicate feature creation)
# workflow_dispatch allows manual trigger for bot-created issues (GitHub bot-loop protection)
on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to parse as vision'
        required: true
        type: number

permissions:
  issues: write

jobs:
  parse-vision:
    name: Parse Vision into Features
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issues' && contains(github.event.issue.title, '[VISION]'))
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;

            // Support both event triggers
            let issue;
            if (context.eventName === 'workflow_dispatch') {
              const issueNumber = ${{ github.event.inputs.issue_number || 0 }};
              const response = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              issue = response.data;
              if (!issue.title.includes('[VISION]')) {
                core.info(`Issue #${issueNumber} is not a vision issue - skipping.`);
                return;
              }
            } else {
              issue = context.payload.issue;
            }
            const body = issue.body || '';

            // Prevent duplicate processing: check if "Vision Parsed" comment already exists
            const existingComments = await github.rest.issues.listComments({
              owner, repo,
              issue_number: issue.number
            });
            const alreadyParsed = existingComments.data.some(c =>
              c.user.type === 'Bot' && (c.body.includes('Vision Parsed') || c.body.includes('Vision Received'))
            );
            if (alreadyParsed) {
              core.info('Vision already parsed - skipping to prevent duplicates.');
              return;
            }

            // Extract the vision title (remove [VISION] prefix)
            const visionTitle = issue.title.replace(/\[VISION\]\s*/i, '').trim();

            // Add vision label
            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: issue.number,
              labels: ['vision', 'epic', 'pinned']
            });

            // Parse bullet points (-, *, or numbered lists)
            const lines = body.split('\n');
            const features = [];
            for (const line of lines) {
              const match = line.match(/^\s*(?:[-*]|\d+[.)]\s)\s*(.+)/);
              if (match) {
                const text = match[1].trim();
                // Skip checkbox syntax, empty lines, or very short entries
                if (text.length > 3 && !text.startsWith('[')) {
                  features.push(text);
                }
              }
            }

            if (features.length === 0) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issue.number,
                body: `## Vision Received!\n\nNo bullet points found to convert to features.\n\nTo auto-create feature issues, use bullet points:\n\`\`\`\n- Feature idea 1\n- Feature idea 2\n- Feature idea 3\n\`\`\``
              });
              return;
            }

            // Create feature issues for each bullet point
            const createdIssues = [];
            for (const feature of features) {
              const text = feature.toLowerCase();
              const labels = ['enhancement', 'needs-triage'];

              // Auto-categorize by DE/EN keywords
              if (text.match(/render|grafik|shader|opengl|visual/)) labels.push('area: rendering');
              if (text.match(/kampf|combat|attack|angriff|waffe|weapon/)) labels.push('area: combat');
              if (text.match(/magic|magie|zauber|spell|mana/)) labels.push('area: magic');
              if (text.match(/quest|dialog|npc|story|geschichte/)) labels.push('area: quest-system');
              if (text.match(/inventory|inventar|item|gegenstand|equipment|ausruestung/)) labels.push('area: inventory');
              if (text.match(/welt|world|terrain|map|karte|region/)) labels.push('area: world-gen');
              if (text.match(/audio|sound|musik|music/)) labels.push('area: audio');
              if (text.match(/save|load|speicher/)) labels.push('area: save-system');
              if (text.match(/ui|hud|menu|interface|anzeige/)) labels.push('area: ui');
              if (text.match(/dungeon|kerker|hoehle|cave/)) labels.push('area: dungeon');
              if (text.match(/wetter|weather|regen|rain|sturm|storm/)) labels.push('area: weather');
              if (text.match(/craft|schmied|rezept|recipe/)) labels.push('area: crafting');
              if (text.match(/boss|endgegner/)) labels.push('area: combat');

              const created = await github.rest.issues.create({
                owner, repo,
                title: feature,
                body: `## Feature from Vision\n\n**Vision**: ${visionTitle}\n**Source**: #${issue.number}\n\n### Description\n${feature}\n\n---\n_Auto-created from vision issue._`,
                labels
              });

              createdIssues.push(`- #${created.data.number}: ${feature}`);
            }

            // Post summary comment
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: issue.number,
              body: `## Vision Parsed!\n\n**${features.length} Feature-Issues erstellt:**\n\n${createdIssues.join('\n')}\n\nJedes Feature wird automatisch kategorisiert und priorisiert.\nDer Entwicklungszyklus arbeitet diese Issues ab.`
            });
