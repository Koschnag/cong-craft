name: Auto Version

on:
  push:
    branches: [main, master]

permissions:
  contents: write
  actions: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        run: |
          # Get latest semver tag, default to v0.0.0
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          LATEST=${LATEST:-v0.0.0}

          # Parse major.minor.patch
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Check commit message for bump hints
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -qi "breaking\|major"; then
            MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
          elif echo "$MSG" | grep -qi "feat\|feature\|minor"; then
            MINOR=$((MINOR+1)); PATCH=0
          else
            PATCH=$((PATCH+1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $LATEST -> $NEW_TAG"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          # Tags pushed with GITHUB_TOKEN don't trigger other workflows,
          # so we explicitly trigger the release workflow on the new tag
          gh workflow run release.yml --ref "$NEW_TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
