name: Auto Create PR

# When a feature branch is pushed, auto-create a PR if one doesn't exist yet
on:
  push:
    branches-ignore:
      - main
      - master
      - 'dependabot/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    name: Create PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');

            // Check if PR already exists for this branch
            const existing = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              head: `${owner}:${branch}`
            });

            if (existing.data.length > 0) {
              core.info(`PR #${existing.data[0].number} already exists for ${branch}`);
              return;
            }

            // Get the latest commit message for the PR title
            const commits = await github.rest.repos.listCommits({
              owner, repo,
              sha: branch,
              per_page: 1
            });
            const latestCommit = commits.data[0];
            const commitMsg = latestCommit.commit.message.split('\n')[0];

            // Determine PR title from branch name or commit
            let title = commitMsg;
            // Clean up branch prefixes like claude/fix-something-ABC123
            const branchClean = branch
              .replace(/^claude\//, '')
              .replace(/-[A-Za-z0-9]{5,}$/, '')  // Remove session IDs
              .replace(/-/g, ' ');

            // Build body from all commits on this branch (vs main)
            let body = '';
            try {
              const comparison = await github.rest.repos.compareCommits({
                owner, repo,
                base: 'main',
                head: branch
              });
              const commitList = comparison.data.commits
                .map(c => `- ${c.commit.message.split('\n')[0]}`)
                .join('\n');
              body = `## Changes\n\n${commitList}\n\n---\n*Auto-created from branch \`${branch}\`*`;
            } catch (e) {
              body = `Auto-created from branch \`${branch}\``;
            }

            try {
              const pr = await github.rest.pulls.create({
                owner, repo,
                title,
                body,
                head: branch,
                base: 'main'
              });
              core.info(`Created PR #${pr.data.number}: ${title}`);
            } catch (e) {
              // PR creation can fail if branch has no diff vs main
              core.info(`Could not create PR: ${e.message}`);
            }
