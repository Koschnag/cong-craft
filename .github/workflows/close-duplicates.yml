name: Close Duplicate Issues (One-time cleanup)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/close-duplicates.yml'

permissions:
  issues: write

jobs:
  close-duplicates:
    name: Close Known Duplicates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const duplicates = [
              { number: 38, original: 36 },
              { number: 39, original: 37 }
            ];

            for (const dup of duplicates) {
              try {
                const issue = await github.rest.issues.get({
                  owner, repo,
                  issue_number: dup.number
                });

                if (issue.data.state === 'open') {
                  await github.rest.issues.createComment({
                    owner, repo,
                    issue_number: dup.number,
                    body: `Closing as duplicate of #${dup.original}.\n\nThis duplicate was caused by the feedback-approved workflow firing twice (on both \`issue_comment\` and \`issues.closed\` events). The root cause has been fixed.`
                  });

                  await github.rest.issues.update({
                    owner, repo,
                    issue_number: dup.number,
                    state: 'closed',
                    state_reason: 'not_planned'
                  });

                  // Add duplicate label if it exists
                  try {
                    await github.rest.issues.addLabels({
                      owner, repo,
                      issue_number: dup.number,
                      labels: ['duplicate']
                    });
                  } catch (e) {
                    core.info(`Could not add label: ${e.message}`);
                  }

                  core.info(`Closed #${dup.number} as duplicate of #${dup.original}`);
                } else {
                  core.info(`#${dup.number} is already closed.`);
                }
              } catch (e) {
                core.warning(`Could not process #${dup.number}: ${e.message}`);
              }
            }
