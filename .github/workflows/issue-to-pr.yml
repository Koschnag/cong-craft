name: Auto-resolve Issues

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  resolve:
    if: >
      contains(github.event.issue.labels.*.name, 'auto') ||
      contains(github.event.issue.labels.*.name, 'bug') ||
      contains(github.event.issue.labels.*.name, 'enhancement')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are working on CongCraft, a .NET 8 medieval action RPG built with .NET 8 and Silk.NET.
            Read the CLAUDE.md file for project conventions.
            Fix the following GitHub issue.
            After making changes, run 'dotnet build' and 'dotnet test' to verify your fix compiles and passes all tests.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}
          claude_args: "--max-turns 30"
