name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test --configuration Release

  build-release:
    needs: test
    strategy:
      matrix:
        include:
          - os: macos-14
            rid: osx-arm64
            name: CongCraft-macOS-arm64
            archive: tar.gz
          - os: macos-13
            rid: osx-x64
            name: CongCraft-macOS-x64
            archive: tar.gz
          - os: ubuntu-latest
            rid: linux-x64
            name: CongCraft-linux-x64
            archive: tar.gz
          - os: windows-latest
            rid: win-x64
            name: CongCraft-windows-x64
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Native AOT
        run: >
          dotnet publish src/CongCraft.Game/CongCraft.Game.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --output ./publish

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        run: |
          find ./publish -type f \( -name '*.dylib' -o -name 'CongCraft.Game' \) -exec codesign --force --deep -s - {} \;

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd publish
          chmod +x CongCraft.Game
          tar -czf ../${{ matrix.name }}.tar.gz *

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath ./${{ matrix.name }}.zip

      - name: Create DMG (macOS ARM64)
        if: matrix.rid == 'osx-arm64'
        run: |
          mkdir -p dmg-content
          cp -R publish/* dmg-content/
          chmod +x dmg-content/CongCraft.Game
          hdiutil create -volname "CongCraft" -srcfolder dmg-content \
            -ov -format UDZO CongCraft-macOS-arm64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.${{ matrix.archive }}
            CongCraft-macOS-arm64.dmg

  release:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.dmg
