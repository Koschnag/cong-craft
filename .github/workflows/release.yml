name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet test --configuration Release

  build-release-linux-windows:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            name: CongCraft-linux-x64
            archive: tar.gz
          - os: windows-latest
            rid: win-x64
            name: CongCraft-windows-x64
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Native AOT
        run: >
          dotnet publish src/CongCraft.Game/CongCraft.Game.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --output ./publish

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd publish
          chmod +x CongCraft.Game
          tar -czf ../${{ matrix.name }}.tar.gz *

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath ./${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.${{ matrix.archive }}

  build-release-macos:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install native dependencies
        run: brew install glfw

      - name: Publish Native AOT (macOS ARM64)
        run: >
          dotnet publish src/CongCraft.Game/CongCraft.Game.csproj
          --configuration Release
          --runtime osx-arm64
          --output ./publish

      - name: Create .app bundle
        run: |
          APP="CongCraft.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp packaging/macos/Info.plist "$APP/Contents/"
          cp publish/CongCraft.Game "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/CongCraft.Game"
          find publish -name '*.dylib' -exec cp {} "$APP/Contents/MacOS/" \;

          # Copy game assets
          if [ -d publish/congcraft_assets ]; then
            cp -R publish/congcraft_assets "$APP/Contents/MacOS/congcraft_assets"
          fi

      - name: Sign .app bundle
        run: |
          find CongCraft.app -name '*.dylib' -exec codesign --force --options runtime --entitlements packaging/macos/entitlements.plist -s - {} \;
          codesign --force --options runtime --entitlements packaging/macos/entitlements.plist -s - CongCraft.app/Contents/MacOS/CongCraft.Game
          codesign --force --options runtime --entitlements packaging/macos/entitlements.plist -s - CongCraft.app

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R CongCraft.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "CongCraft" -srcfolder dmg-staging -ov -format UDZO CongCraft-macOS-arm64.dmg

      - name: Create zip
        run: zip -r CongCraft-macOS-arm64.zip CongCraft.app

      - uses: actions/upload-artifact@v4
        with:
          name: CongCraft-macOS-arm64-dmg
          path: CongCraft-macOS-arm64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: CongCraft-macOS-arm64-zip
          path: CongCraft-macOS-arm64.zip

  release:
    needs: [build-release-linux-windows, build-release-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.dmg
