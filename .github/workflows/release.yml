name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test --configuration Release

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: macos-14
            rid: osx-arm64
            name: CongCraft-macOS-arm64
            binary: CongCraft.Game
          - os: ubuntu-latest
            rid: linux-x64
            name: CongCraft-linux-x64
            binary: CongCraft.Game
          - os: windows-latest
            rid: win-x64
            name: CongCraft-windows-x64
            binary: CongCraft.Game.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Native AOT
        run: >
          dotnet publish src/CongCraft.Game/CongCraft.Game.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --output ./publish

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --deep -s - ./publish/${{ matrix.binary }}

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd publish
          chmod +x ${{ matrix.binary }}
          zip -r ../${{ matrix.name }}.zip ${{ matrix.binary }} *.dylib *.so 2>/dev/null || zip -r ../${{ matrix.name }}.zip ${{ matrix.binary }}

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath ./${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.zip
