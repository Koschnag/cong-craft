name: Claude Code - Fix CI Failures

# Triggers:
# 1. When ci-retry gives up (dispatched by ci-retry after 5 failed attempts)
# 2. When auto-fix reports unfixable build errors
# 3. Manual dispatch with PR number
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number with failing CI'
        required: true
        type: number
      failure_type:
        description: 'Type of failure'
        required: false
        default: 'unknown'
        type: choice
        options:
          - build
          - test
          - unknown

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read

concurrency:
  group: claude-fix-ci-${{ github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  fix-ci:
    name: Fix CI with Claude
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = parseInt('${{ github.event.inputs.pr_number }}');

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            if (pr.data.state !== 'open') {
              core.info('PR is not open - skipping');
              core.setOutput('should_run', 'false');
              return;
            }

            // Get the latest check runs to understand what failed
            const checks = await github.rest.checks.listForRef({
              owner, repo,
              ref: pr.data.head.sha
            });

            const failedChecks = checks.data.check_runs
              .filter(c => c.conclusion === 'failure')
              .map(c => `${c.name}: ${c.output?.summary || 'failed'}`)
              .join('\n');

            // Get recent PR comments for error context
            const comments = await github.rest.issues.listComments({
              owner, repo,
              issue_number: prNumber,
              per_page: 5
            });

            const errorContext = comments.data
              .filter(c => c.body.includes('error') || c.body.includes('fail') || c.body.includes(':x:'))
              .map(c => c.body)
              .join('\n---\n')
              .slice(0, 3000);

            core.setOutput('should_run', 'true');
            core.setOutput('number', String(prNumber));
            core.setOutput('branch', pr.data.head.ref);
            core.setOutput('title', pr.data.title);
            core.setOutput('failed_checks', failedChecks);
            core.setOutput('error_context', errorContext);

      - name: Comment on PR
        if: steps.pr.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: parseInt('${{ steps.pr.outputs.number }}'),
              body: [
                '## :robot: Claude Code - Attempting CI Fix',
                '',
                'The auto-retry loop could not fix the failures. Claude Code is now analyzing and fixing the issues...',
                '',
                `[View run](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`
              ].join('\n')
            });

      - name: Checkout PR branch
        if: steps.pr.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        if: steps.pr.outputs.should_run == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Claude Code
        if: steps.pr.outputs.should_run == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Diagnose failures
        if: steps.pr.outputs.should_run == 'true'
        id: diagnose
        run: |
          dotnet restore

          # Capture build output
          dotnet build --configuration Release --no-restore 2>&1 | tee /tmp/build-output.txt || true
          BUILD_ERRORS=$(grep ": error " /tmp/build-output.txt | head -30 || true)

          # If build passes, capture test output
          if dotnet build --configuration Release --no-restore 2>/dev/null; then
            dotnet test --configuration Release --no-build --verbosity normal 2>&1 | tee /tmp/test-output.txt || true
            TEST_FAILURES=$(grep -A5 "Failed " /tmp/test-output.txt | head -50 || true)
            echo "build_passes=true" >> "$GITHUB_OUTPUT"
          else
            TEST_FAILURES=""
            echo "build_passes=false" >> "$GITHUB_OUTPUT"
          fi

          # Save diagnostics
          {
            echo "BUILD_ERRORS<<DIAG_EOF"
            echo "$BUILD_ERRORS"
            echo "DIAG_EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "TEST_FAILURES<<DIAG_EOF2"
            echo "$TEST_FAILURES"
            echo "DIAG_EOF2"
          } >> "$GITHUB_OUTPUT"

      - name: Fix with Claude Code
        if: steps.pr.outputs.should_run == 'true'
        id: fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FAILURE_TYPE="${{ github.event.inputs.failure_type }}"
          BUILD_ERRORS="${{ steps.diagnose.outputs.BUILD_ERRORS }}"
          TEST_FAILURES="${{ steps.diagnose.outputs.TEST_FAILURES }}"
          ERROR_CONTEXT="${{ steps.pr.outputs.error_context }}"

          cat > /tmp/claude-fix-prompt.txt << 'PROMPT_EOF'
          You are working on CongCraft, a medieval action RPG in .NET 8 with OpenGL via Silk.NET.

          ## Your Task
          Fix the CI failures on this PR so ALL tests pass and the build succeeds.

          **PR Title:** PR_TITLE_PLACEHOLDER
          **Failure Type:** FAILURE_TYPE_PLACEHOLDER

          ### Build Errors
          ```
          BUILD_ERRORS_PLACEHOLDER
          ```

          ### Test Failures
          ```
          TEST_FAILURES_PLACEHOLDER
          ```

          ### CI Error Context
          ERROR_CONTEXT_PLACEHOLDER

          ## Instructions
          1. Analyze the error messages carefully
          2. Read the relevant source and test files
          3. Fix the root cause (don't just suppress errors)
          4. Run `dotnet build` - must succeed with 0 errors
          5. Run `dotnet test` - ALL tests must pass (0 failures)
          6. If your fix causes other tests to fail, fix those too
          7. Keep changes minimal - only fix what's broken

          ## Rules
          - ALL tests MUST pass (0 failures) - this is non-negotiable
          - Build MUST succeed with 0 errors
          - Do NOT delete or skip tests to make them pass
          - Do NOT add [Skip] attributes to tests
          - Fix the actual code, not the tests (unless the test itself is wrong)
          - Follow existing code conventions
          PROMPT_EOF

          sed -i "s|PR_TITLE_PLACEHOLDER|${{ steps.pr.outputs.title }}|g" /tmp/claude-fix-prompt.txt
          sed -i "s|FAILURE_TYPE_PLACEHOLDER|${FAILURE_TYPE}|g" /tmp/claude-fix-prompt.txt
          sed -i "s|BUILD_ERRORS_PLACEHOLDER|${BUILD_ERRORS}|g" /tmp/claude-fix-prompt.txt
          sed -i "s|TEST_FAILURES_PLACEHOLDER|${TEST_FAILURES}|g" /tmp/claude-fix-prompt.txt
          sed -i "s|ERROR_CONTEXT_PLACEHOLDER|${ERROR_CONTEXT}|g" /tmp/claude-fix-prompt.txt

          PROMPT=$(cat /tmp/claude-fix-prompt.txt)

          if claude -p "$PROMPT" \
            --allowedTools "Read,Glob,Grep,Edit,Write,Bash(dotnet build*),Bash(dotnet test*),Bash(dotnet restore*),Bash(dotnet format*),Bash(git diff*),Bash(git status*),Bash(ls*),Bash(find*)" \
            --output-format text 2>&1 | tee /tmp/claude-output.txt; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Final verification
        if: steps.pr.outputs.should_run == 'true'
        id: verify
        run: |
          dotnet restore
          if dotnet build --configuration Release 2>&1 | tee /tmp/final-build.txt; then
            echo "build=success" >> "$GITHUB_OUTPUT"
          else
            echo "build=failure" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TEST_OUT=$(dotnet test --configuration Release --no-build --verbosity normal 2>&1) || true
          echo "$TEST_OUT" | tee /tmp/final-test.txt

          FAILED=$(echo "$TEST_OUT" | grep -oP 'Failed:\s*\K\d+' || echo "0")
          PASSED=$(echo "$TEST_OUT" | grep -oP 'Passed:\s*\K\d+' || echo "0")
          echo "test_passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "test_failed=$FAILED" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq "0" ] && [ "$PASSED" -gt "0" ]; then
            echo "tests=success" >> "$GITHUB_OUTPUT"
          else
            echo "tests=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Push fixes
        if: >
          steps.pr.outputs.should_run == 'true' &&
          steps.verify.outputs.build == 'success' &&
          steps.verify.outputs.tests == 'success'
        id: push
        run: |
          git config user.name "claude-code[bot]"
          git config user.email "claude-code[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -A
          git commit -m "fix: resolve CI failures (Claude Code auto-fix)

          Build: passing
          Tests: ${{ steps.verify.outputs.test_passed }} passed, 0 failed

          Automatically fixed by Claude Code after ci-retry exhausted retries."

          git push origin "${{ steps.pr.outputs.branch }}"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Report result
        if: always() && steps.pr.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');
            const buildStatus = '${{ steps.verify.outputs.build }}' || 'unknown';
            const testStatus = '${{ steps.verify.outputs.tests }}' || 'unknown';
            const testPassed = '${{ steps.verify.outputs.test_passed }}' || '0';
            const testFailed = '${{ steps.verify.outputs.test_failed }}' || '0';
            const pushed = '${{ steps.push.outputs.pushed }}';

            const allGreen = buildStatus === 'success' && testStatus === 'success' && pushed === 'true';

            const lines = [
              `## :robot: Claude Code CI Fix - ${allGreen ? ':white_check_mark: Success' : ':x: Could not fully resolve'}`,
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Build | ${buildStatus === 'success' ? ':white_check_mark:' : ':x:'} |`,
              `| Tests | ${testStatus === 'success' ? ':white_check_mark:' : ':x:'} ${testPassed} passed, ${testFailed} failed |`,
              `| Fix pushed | ${pushed === 'true' ? ':white_check_mark:' : ':x:'} |`,
              '',
            ];

            if (allGreen) {
              lines.push(':rocket: **All fixed!** CI will re-run and auto-merge will evaluate.');

              // Remove blocked label if present
              try {
                await github.rest.issues.removeLabel({
                  owner, repo,
                  issue_number: prNumber,
                  name: 'blocked'
                });
              } catch (e) { /* label might not exist */ }
            } else {
              lines.push(':warning: Claude Code could not fully fix the CI failures. Manual intervention needed.');
            }

            lines.push('');
            lines.push(`[View run](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`);

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: prNumber,
              body: lines.join('\n')
            });
