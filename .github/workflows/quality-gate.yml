name: Code Quality Enforcement

on:
  pull_request:
    branches: [main, master]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  format-check:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Check code formatting
        id: format
        run: |
          if dotnet format --verify-no-changes --verbosity diagnostic 2>&1 | tee format-output.txt; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Report formatting issues
        if: steps.format.outputs.result == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('format-output.txt', 'utf8');
            const lines = output.split('\n').filter(l => l.includes('Formatted'));

            let body = '## Code Formatting Issues\n\n';
            if (lines.length > 0) {
              body += 'The following files need formatting:\n\n';
              body += lines.map(l => `- \`${l}\``).join('\n');
            }
            body += '\n\nRun `dotnet format` to fix these automatically.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: Fail on formatting issues
        if: steps.format.outputs.result == 'fail'
        run: |
          echo "::error::Code formatting issues detected. Run 'dotnet format' locally to fix."
          exit 1

  build-warnings:
    name: Build Warnings Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build and capture warnings
        id: build
        run: |
          dotnet build --configuration Release --no-restore 2>&1 | tee build-output.txt
          WARNINGS=$(grep -c "warning " build-output.txt || true)
          ERRORS=$(grep -c "error " build-output.txt || true)
          echo "warnings=${WARNINGS:-0}" >> "$GITHUB_OUTPUT"
          echo "errors=${ERRORS:-0}" >> "$GITHUB_OUTPUT"

      - name: Post build analysis
        uses: actions/github-script@v7
        with:
          script: |
            const warnings = parseInt('${{ steps.build.outputs.warnings }}') || 0;
            const errors = parseInt('${{ steps.build.outputs.errors }}') || 0;

            let emoji = 'white_check_mark';
            if (errors > 0) emoji = 'x';
            else if (warnings > 5) emoji = 'warning';

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Build Quality',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: errors > 0 ? 'failure' : 'success',
              output: {
                title: `Build: ${warnings} warnings, ${errors} errors`,
                summary: `:${emoji}: Build\n\n| Metric | Count |\n|--------|-------|\n| Warnings | ${warnings} |\n| Errors | ${errors} |`
              }
            });

  test-coverage:
    name: Test Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Run tests with coverage
        run: |
          dotnet test --configuration Release --no-restore \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Parse coverage
        id: coverage
        run: |
          COVERAGE_FILE=$(find coverage -name "coverage.cobertura.xml" 2>/dev/null | head -1)
          if [ -n "$COVERAGE_FILE" ]; then
            RATE=$(grep -oP 'line-rate="\K[^"]+' "$COVERAGE_FILE" | head -1 || echo "0")
            PCT=$(awk "BEGIN {printf \"%.1f\", $RATE * 100}" 2>/dev/null || echo "0")
            echo "percentage=$PCT" >> "$GITHUB_OUTPUT"
          else
            echo "percentage=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Coverage gate
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = parseFloat('${{ steps.coverage.outputs.percentage }}') || 0;
            const threshold = 30;
            const passed = coverage >= threshold;

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Coverage Gate',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: passed ? 'success' : 'failure',
              output: {
                title: `Coverage: ${coverage}% (threshold: ${threshold}%)`,
                summary: passed
                  ? `:white_check_mark: Coverage ${coverage}% meets threshold of ${threshold}%`
                  : `:x: Coverage ${coverage}% is below threshold of ${threshold}%`
              }
            });

  quality-result:
    name: Quality Result
    needs: [format-check, build-warnings, test-coverage]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const results = {
              format: '${{ needs.format-check.result }}',
              build: '${{ needs.build-warnings.result }}',
              coverage: '${{ needs.test-coverage.result }}'
            };

            const allPassed = Object.values(results).every(r => r === 'success');

            if (!allPassed) {
              core.setFailed(`Quality checks: ${JSON.stringify(results)}`);
            }
