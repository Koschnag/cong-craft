name: Create Vision - Erste spielbare Version

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/create-vision-v1.yml'
  workflow_dispatch:

permissions:
  issues: write
  actions: write

jobs:
  create-vision:
    name: Create Vision Issue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Check if already created (prevent duplicates)
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'all', per_page: 100
            });
            const alreadyExists = existing.data.some(i =>
              i.title.includes('[VISION]') && i.title.includes('Erste spielbare Version')
            );
            if (alreadyExists) {
              core.info('Vision issue already exists - skipping.');
              return;
            }

            const issue = await github.rest.issues.create({
              owner, repo,
              title: '[VISION] Erste spielbare Version - Ein Level, alle Basics, M1-optimiert',
              body: [
                '## Vision: Erste fertige, spielbare Software',
                '',
                'Ein komplettes Level mit allen grundlegenden Funktionen.',
                '**Zielplattform:** Apple M1 Mac mit 8GB RAM - muss fluessig und problemlos laufen.',
                '',
                '### Spielwelt & Level',
                '- Spielbares erstes Level mit Terrain, Baeumen und mittelalterlichem Dorf als Startgebiet',
                '- Tag-Nacht-Zyklus und einfaches Wettersystem im Level',
                '',
                '### Kampf & Gegner',
                '- Grundlegendes Kampfsystem mit Nahkampf-Waffe (Schwert) und einem Zauberspruch',
                '- 3-5 verschiedene Gegnertypen die im Level spawnen mit sinnvoller KI',
                '',
                '### Items & Inventar',
                '- Einfaches Inventar- und Ausruestungssystem (Waffe, Ruestung, Verbrauchsgegenstaende)',
                '',
                '### Quests & NPCs',
                '- Funktionierendes Quest-System mit einer Hauptquest und 2-3 Nebenquests',
                '- NPC-Dialog-System mit mindestens einem Quest-Geber und einem Haendler',
                '',
                '### UI & HUD',
                '- HUD mit Lebensanzeige, Mana, Minimap und Quest-Tracker',
                '',
                '### Speichern',
                '- Speichern und Laden des Spielstands',
                '',
                '### Audio',
                '- Sound-Effekte fuer Kampf, UI-Interaktion und Ambient-Sounds',
                '',
                '### Performance & Build (KRITISCH)',
                '- Performance-Optimierung fuer Apple M1 mit 8GB RAM (max 2GB RAM-Verbrauch, stabile 60 FPS)',
                '- Native AOT Build fuer macOS ARM64 der ohne .NET Runtime laeuft',
                '- Memory Pooling und Object Reuse um GC-Pausen zu vermeiden',
                '- Effizientes Asset-Loading das nicht den gesamten RAM belegt',
              ].join('\n')
            });

            core.info(`Vision issue created: #${issue.data.number}`);

            // GITHUB_TOKEN events don't trigger other workflows.
            // Explicitly dispatch the vision-parser to process this issue.
            await github.rest.actions.createWorkflowDispatch({
              owner, repo,
              workflow_id: 'vision-parser.yml',
              ref: 'main',
              inputs: { issue_number: String(issue.data.number) }
            });
            core.info(`Vision parser dispatched for issue #${issue.data.number}`);
