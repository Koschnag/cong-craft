name: Claude Code - Solve Issue

# Triggers:
# 1. When an issue is labeled 'claude' or 'automated'
# 2. When a new issue is created with 'bug' or 'enhancement' label
# 3. Manual dispatch with issue number
on:
  issues:
    types: [labeled, opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to solve'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

# Only one Claude session per issue at a time
concurrency:
  group: claude-solve-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  solve:
    name: Solve Issue with Claude
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'labeled' &&
       (github.event.label.name == 'claude' || github.event.label.name == 'automated')) ||
      (github.event.action == 'opened' &&
       github.event.issue.labels[0] != null)
    steps:
      - name: Determine issue number
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            let issueNumber;
            if (context.eventName === 'workflow_dispatch') {
              issueNumber = parseInt('${{ github.event.inputs.issue_number }}');
            } else {
              issueNumber = context.payload.issue.number;
            }

            // Get full issue details
            const { owner, repo } = context.repo;
            const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });

            // Skip PRs (GitHub treats PRs as issues)
            if (issue.data.pull_request) {
              core.info('This is a PR, not an issue - skipping');
              core.setOutput('should_run', 'false');
              return;
            }

            // Skip closed issues
            if (issue.data.state === 'closed') {
              core.info('Issue is closed - skipping');
              core.setOutput('should_run', 'false');
              return;
            }

            // Skip issues already being worked on
            const labels = issue.data.labels.map(l => l.name);
            if (labels.includes('in-progress-by-claude')) {
              core.info('Already being worked on by Claude - skipping');
              core.setOutput('should_run', 'false');
              return;
            }

            // For opened events, only auto-solve bug/enhancement issues
            if (context.eventName === 'issues' && context.payload.action === 'opened') {
              const autoSolveLabels = ['bug', 'enhancement', 'automated'];
              const hasAutoLabel = labels.some(l => autoSolveLabels.includes(l));
              if (!hasAutoLabel) {
                core.info('Issue does not have auto-solve labels - skipping');
                core.setOutput('should_run', 'false');
                return;
              }
            }

            core.setOutput('should_run', 'true');
            core.setOutput('number', String(issueNumber));
            core.setOutput('title', issue.data.title);
            core.setOutput('body', issue.data.body || '');
            core.setOutput('labels', labels.join(','));

      - name: Mark issue as in-progress
        if: steps.issue.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = parseInt('${{ steps.issue.outputs.number }}');

            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: issueNumber,
              labels: ['in-progress-by-claude']
            });

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: issueNumber,
              body: [
                '## :robot: Claude Code is working on this',
                '',
                'Analyzing the issue and implementing a solution...',
                '',
                `[View run](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`
              ].join('\n')
            });

      - name: Checkout
        if: steps.issue.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        if: steps.issue.outputs.should_run == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Claude Code
        if: steps.issue.outputs.should_run == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Create branch
        if: steps.issue.outputs.should_run == 'true'
        id: branch
        run: |
          ISSUE_NUM="${{ steps.issue.outputs.number }}"
          # Sanitize title for branch name
          TITLE=$(echo "${{ steps.issue.outputs.title }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | head -c 40)
          BRANCH="claude/issue-${ISSUE_NUM}-${TITLE}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Solve issue with Claude Code
        if: steps.issue.outputs.should_run == 'true'
        id: solve
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ISSUE_TITLE="${{ steps.issue.outputs.title }}"
          ISSUE_BODY="${{ steps.issue.outputs.body }}"
          ISSUE_LABELS="${{ steps.issue.outputs.labels }}"

          # Build the prompt for Claude
          cat > /tmp/claude-prompt.txt << 'PROMPT_EOF'
          You are working on CongCraft, a medieval action RPG in .NET 8 with OpenGL via Silk.NET.

          ## Your Task
          Solve the following GitHub issue by making code changes:

          **Issue Title:** ISSUE_TITLE_PLACEHOLDER
          **Issue Labels:** ISSUE_LABELS_PLACEHOLDER
          **Issue Description:**
          ISSUE_BODY_PLACEHOLDER

          ## Instructions
          1. Read the relevant source files to understand the codebase
          2. Make the necessary code changes to solve this issue
          3. Run `dotnet build` to verify the build passes
          4. Run `dotnet test` to verify all tests pass
          5. If tests fail, fix them until they all pass
          6. Keep changes minimal and focused on the issue

          ## Rules
          - ALL tests MUST pass (0 failures)
          - Build MUST succeed with 0 errors
          - Follow existing code conventions (nullable enabled, .NET 8)
          - Use System.Text.Json with source generators (AOT-safe)
          - Do NOT break existing functionality
          - Write new tests if adding new features
          PROMPT_EOF

          # Replace placeholders
          sed -i "s|ISSUE_TITLE_PLACEHOLDER|${ISSUE_TITLE}|g" /tmp/claude-prompt.txt
          sed -i "s|ISSUE_LABELS_PLACEHOLDER|${ISSUE_LABELS}|g" /tmp/claude-prompt.txt
          sed -i "s|ISSUE_BODY_PLACEHOLDER|${ISSUE_BODY}|g" /tmp/claude-prompt.txt

          PROMPT=$(cat /tmp/claude-prompt.txt)

          # Run Claude Code in non-interactive mode
          if claude -p "$PROMPT" \
            --allowedTools "Read,Glob,Grep,Edit,Write,Bash(dotnet build*),Bash(dotnet test*),Bash(dotnet restore*),Bash(dotnet format*),Bash(git diff*),Bash(git status*),Bash(ls*),Bash(find*)" \
            --output-format text 2>&1 | tee /tmp/claude-output.txt; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify solution
        if: steps.issue.outputs.should_run == 'true'
        id: verify
        run: |
          dotnet restore
          if dotnet build --configuration Release 2>&1 | tee /tmp/build-verify.txt; then
            echo "build=success" >> "$GITHUB_OUTPUT"
          else
            echo "build=failure" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TEST_OUT=$(dotnet test --configuration Release --no-build --verbosity normal 2>&1) || true
          echo "$TEST_OUT" | tee /tmp/test-verify.txt

          FAILED=$(echo "$TEST_OUT" | grep -oP 'Failed:\s*\K\d+' || echo "0")
          PASSED=$(echo "$TEST_OUT" | grep -oP 'Passed:\s*\K\d+' || echo "0")
          echo "test_passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "test_failed=$FAILED" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq "0" ] && [ "$PASSED" -gt "0" ]; then
            echo "tests=success" >> "$GITHUB_OUTPUT"
          else
            echo "tests=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: >
          steps.issue.outputs.should_run == 'true' &&
          steps.verify.outputs.build == 'success' &&
          steps.verify.outputs.tests == 'success'
        id: push
        run: |
          git config user.name "claude-code[bot]"
          git config user.email "claude-code[bot]@users.noreply.github.com"

          # Check if there are changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes made"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -A
          ISSUE_NUM="${{ steps.issue.outputs.number }}"
          ISSUE_TITLE="${{ steps.issue.outputs.title }}"

          git commit -m "fix: resolve #${ISSUE_NUM} - ${ISSUE_TITLE}

          Automatically implemented by Claude Code.
          Closes #${ISSUE_NUM}"

          git push -u origin "${{ steps.branch.outputs.name }}"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: >
          steps.issue.outputs.should_run == 'true' &&
          steps.push.outputs.pushed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = parseInt('${{ steps.issue.outputs.number }}');
            const branch = '${{ steps.branch.outputs.name }}';
            const testPassed = '${{ steps.verify.outputs.test_passed }}';
            const testFailed = '${{ steps.verify.outputs.test_failed }}';

            const pr = await github.rest.pulls.create({
              owner, repo,
              title: `fix: resolve #${issueNumber} - ${{ steps.issue.outputs.title }}`,
              body: [
                `## Resolves #${issueNumber}`,
                '',
                '### Changes',
                'Automatically implemented by Claude Code to solve the linked issue.',
                '',
                '### Verification',
                `- :white_check_mark: Build: passing`,
                `- :white_check_mark: Tests: ${testPassed} passed, ${testFailed} failed`,
                '',
                '_This PR was created autonomously. Auto-merge will evaluate when all CI checks pass._'
              ].join('\n'),
              head: branch,
              base: 'main'
            });

            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: pr.data.number,
              labels: ['automated', 'claude-code']
            });

            core.info(`Created PR #${pr.data.number}`);

      - name: Report failure
        if: >
          steps.issue.outputs.should_run == 'true' &&
          (steps.verify.outputs.build == 'failure' || steps.verify.outputs.tests == 'failure' || steps.push.outputs.pushed != 'true')
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = parseInt('${{ steps.issue.outputs.number }}');
            const buildStatus = '${{ steps.verify.outputs.build }}' || 'unknown';
            const testStatus = '${{ steps.verify.outputs.tests }}' || 'unknown';
            const testPassed = '${{ steps.verify.outputs.test_passed }}' || '0';
            const testFailed = '${{ steps.verify.outputs.test_failed }}' || '0';
            const pushed = '${{ steps.push.outputs.pushed }}';

            let reason = '';
            if (buildStatus === 'failure') {
              reason = 'Build failed after changes.';
            } else if (testStatus === 'failure') {
              reason = `${testFailed} test(s) still failing after changes.`;
            } else if (pushed !== 'true') {
              reason = 'No code changes were made (Claude could not determine a fix).';
            }

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: issueNumber,
              body: [
                '## :warning: Claude Code could not fully resolve this issue',
                '',
                `**Reason:** ${reason}`,
                '',
                '| Check | Status |',
                '|-------|--------|',
                `| Build | ${buildStatus === 'success' ? ':white_check_mark:' : ':x:'} |`,
                `| Tests | ${testStatus === 'success' ? ':white_check_mark:' : ':x:'} ${testPassed} passed, ${testFailed} failed |`,
                '',
                'The issue needs manual review or a different approach.',
                '',
                `[View run](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`
              ].join('\n')
            });

      - name: Clean up labels
        if: always() && steps.issue.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = parseInt('${{ steps.issue.outputs.number }}');
            try {
              await github.rest.issues.removeLabel({
                owner, repo,
                issue_number: issueNumber,
                name: 'in-progress-by-claude'
              });
            } catch (e) {
              // Label might not exist
            }
