name: Auto-Fix Common Issues

on:
  workflow_run:
    workflows: ["Continuous Self-Test Loop", "Nightly Health Check"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  auto-fix:
    name: Auto-Fix
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Auto-format code
        id: format
        run: |
          dotnet format 2>&1 | tee format-log.txt
          CHANGED=$(git diff --name-only | wc -l)
          echo "formatted=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Try build
        id: build
        run: |
          if dotnet build --configuration Release --no-restore 2>&1 | tee build-log.txt; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        id: test
        if: steps.build.outputs.status == 'success'
        run: |
          if dotnet test --configuration Release --no-build 2>&1 | tee test-log.txt; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Create fix PR if changes exist
        if: steps.format.outputs.formatted != '0' && steps.build.outputs.status == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto-fix/format-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-format code

          Applied dotnet format to fix code style issues.
          Triggered by failed self-test run."
          git push -u origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Create PR
        if: steps.format.outputs.formatted != '0' && steps.build.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.BRANCH;
            if (!branch) return;

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'style: auto-format code',
              body: '## Auto-Fix PR\n\nAutomatically created to fix code formatting issues detected by the self-test loop.\n\n- Applied `dotnet format`\n- Build: passing\n\nThis PR will be auto-merged if all checks pass.',
              head: branch,
              base: 'main'
            });

            // Add labels after creation
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: ['automated', 'ci-cd']
            });

            core.info(`Created PR #${pr.data.number}`);

            // GITHUB_TOKEN PRs don't trigger other workflows.
            // Explicitly dispatch CI and Quality Gate for this PR's branch.
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'auto-merge.yml',
                ref: 'main',
                inputs: { pr_number: String(pr.data.number) }
              });
              core.info(`Dispatched auto-merge evaluation for PR #${pr.data.number}`);
            } catch (e) {
              core.warning(`Could not dispatch auto-merge: ${e.message}`);
            }

      - name: Report and escalate unfixable issues
        if: steps.build.outputs.status == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const buildLog = fs.readFileSync('build-log.txt', 'utf8');
            const errors = buildLog.split('\n').filter(l => l.includes(': error ')).slice(0, 20);

            const existing = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'automated,bug',
              state: 'open'
            });

            const buildIssues = existing.data.filter(i => i.title.includes('Build Failure'));

            if (buildIssues.length === 0) {
              const issue = await github.rest.issues.create({
                owner, repo,
                title: `Build Failure - Auto-Fix Required - ${new Date().toISOString().split('T')[0]}`,
                body: `## Build Failure\n\nThe auto-fix workflow could not resolve this build failure. Claude Code will attempt to fix it.\n\n### Errors\n\`\`\`\n${errors.join('\n')}\n\`\`\`\n\n[View run](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`,
                labels: ['bug', 'automated', 'priority: critical', 'claude']
              });
              core.info(`Created issue #${issue.data.number} - Claude Code will pick it up`);
            }
