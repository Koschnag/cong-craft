name: Continuous Self-Test Loop

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  self-test:
    name: Self-Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        id: build
        run: |
          if dotnet build --configuration Release --no-restore 2>&1 | tee build-output.txt; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi
          WARNINGS=$(grep -c "warning " build-output.txt || true)
          ERRORS=$(grep -c ": error " build-output.txt || true)
          echo "warnings=${WARNINGS:-0}" >> "$GITHUB_OUTPUT"
          echo "errors=${ERRORS:-0}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        id: tests
        if: steps.build.outputs.status == 'success'
        run: |
          TEST_OUTPUT=$(dotnet test --configuration Release --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=self-test.trx" \
            --verbosity normal 2>&1) || true
          echo "$TEST_OUTPUT"

          PASSED=$(echo "$TEST_OUTPUT" | grep -oP 'Passed:\s*\K\d+' || echo "0")
          FAILED=$(echo "$TEST_OUTPUT" | grep -oP 'Failed:\s*\K\d+' || echo "0")
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -gt "0" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Code health check
        id: health
        run: |
          TODOS=$(grep -rc "TODO\|FIXME\|HACK\|XXX" src/ --include="*.cs" | awk -F: '{s+=$2} END {print s+0}')
          echo "todos=$TODOS" >> "$GITHUB_OUTPUT"

          LARGE_FILES=$(find src -name "*.cs" -exec wc -l {} + 2>/dev/null | awk '$1 > 500 && !/total/ {count++} END {print count+0}')
          echo "large_files=$LARGE_FILES" >> "$GITHUB_OUTPUT"

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: self-test-results-${{ github.run_number }}
          path: coverage/
          retention-days: 14

      - name: Report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ steps.build.outputs.status }}';
            const testStatus = '${{ steps.tests.outputs.status }}' || 'skipped';
            const warnings = '${{ steps.build.outputs.warnings }}' || '0';
            const errors = '${{ steps.build.outputs.errors }}' || '0';
            const passed = '${{ steps.tests.outputs.passed }}' || '0';
            const failed = '${{ steps.tests.outputs.failed }}' || '0';
            const todos = '${{ steps.health.outputs.todos }}' || '0';
            const largeFiles = '${{ steps.health.outputs.large_files }}' || '0';

            const healthy = buildStatus === 'success' && testStatus === 'success';
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const reportBody = [
              `## ${healthy ? ':white_check_mark:' : ':rotating_light:'} Self-Test Report`,
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Build | ${buildStatus === 'success' ? ':white_check_mark:' : ':x:'} ${errors} errors, ${warnings} warnings |`,
              `| Tests | ${testStatus === 'success' ? ':white_check_mark:' : ':x:'} ${passed} passed, ${failed} failed |`,
              `| Code Health | ${todos} TODOs, ${largeFiles} large files |`,
              '',
              `[View run](${runUrl})`,
            ].join('\n');

            if (!healthy) {
              const existing = await github.rest.issues.listForRepo({
                owner, repo,
                labels: 'automated,bug',
                state: 'open'
              });

              const selfTestIssues = existing.data.filter(i => i.title.includes('Self-Test'));
              if (selfTestIssues.length === 0) {
                await github.rest.issues.create({
                  owner, repo,
                  title: `Self-Test Failed - ${new Date().toISOString().split('T')[0]}`,
                  body: reportBody,
                  labels: ['bug', 'automated', 'priority: high']
                });
              } else {
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: selfTestIssues[0].number,
                  body: reportBody
                });
              }
            } else {
              // Auto-close self-test failure issues
              const existing = await github.rest.issues.listForRepo({
                owner, repo,
                labels: 'automated,bug',
                state: 'open'
              });

              for (const issue of existing.data.filter(i => i.title.includes('Self-Test'))) {
                await github.rest.issues.update({
                  owner, repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: issue.number,
                  body: ':white_check_mark: Self-test is passing again. Auto-closing.'
                });
              }
            }
