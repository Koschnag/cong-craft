name: Continuous Self-Test Loop

on:
  schedule:
    # Run every 6 hours to catch regressions
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      full_scan:
        description: 'Run full deep scan'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  checks: write

jobs:
  self-test:
    name: Self-Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        id: build
        run: |
          BUILD_OUTPUT=$(dotnet build --configuration Release 2>&1) || true
          echo "$BUILD_OUTPUT"
          WARNINGS=$(echo "$BUILD_OUTPUT" | grep -c "warning " || echo "0")
          ERRORS=$(echo "$BUILD_OUTPUT" | grep -c "error " || echo "0")
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
          if echo "$BUILD_OUTPUT" | grep -q "Build succeeded"; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Run full test suite
        id: tests
        if: steps.build.outputs.status == 'success'
        run: |
          TEST_OUTPUT=$(dotnet test --configuration Release --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=self-test.trx" \
            --verbosity normal 2>&1) || true
          echo "$TEST_OUTPUT"

          PASSED=$(echo "$TEST_OUTPUT" | grep -oP 'Passed:\s*\K\d+' || echo "0")
          FAILED=$(echo "$TEST_OUTPUT" | grep -oP 'Failed:\s*\K\d+' || echo "0")
          SKIPPED=$(echo "$TEST_OUTPUT" | grep -oP 'Skipped:\s*\K\d+' || echo "0")
          TOTAL=$(echo "$TEST_OUTPUT" | grep -oP 'Total:\s*\K\d+' || echo "0")

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -gt "0" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Check code health
        id: health
        run: |
          # Count TODO/FIXME/HACK in code
          TODOS=$(grep -r "TODO\|FIXME\|HACK\|XXX" src/ --include="*.cs" | wc -l || echo "0")
          echo "todos=$TODOS" >> "$GITHUB_OUTPUT"

          # Count files without tests
          SRC_SYSTEMS=$(find src -name "*System.cs" -o -name "*Component.cs" | wc -l)
          TEST_FILES=$(find tests -name "*.cs" | wc -l)
          echo "src_systems=$SRC_SYSTEMS" >> "$GITHUB_OUTPUT"
          echo "test_files=$TEST_FILES" >> "$GITHUB_OUTPUT"

          # Detect large files (>500 lines)
          LARGE_FILES=$(find src -name "*.cs" -exec wc -l {} + | awk '$1 > 500 {print $2}' | wc -l || echo "0")
          echo "large_files=$LARGE_FILES" >> "$GITHUB_OUTPUT"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: self-test-results-${{ github.run_number }}
          path: coverage/
          retention-days: 14

      - name: Report results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ steps.build.outputs.status }}';
            const testStatus = '${{ steps.tests.outputs.status }}' || 'skipped';
            const warnings = '${{ steps.build.outputs.warnings }}';
            const errors = '${{ steps.build.outputs.errors }}';
            const passed = '${{ steps.tests.outputs.passed }}';
            const failed = '${{ steps.tests.outputs.failed }}';
            const todos = '${{ steps.health.outputs.todos }}';
            const largeFiles = '${{ steps.health.outputs.large_files }}';

            const healthy = buildStatus === 'success' && testStatus === 'success';
            const emoji = healthy ? ':white_check_mark:' : ':rotating_light:';

            const title = `Self-Test Report - ${new Date().toISOString().split('T')[0]}`;

            if (!healthy) {
              // Create issue for failures
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'automated,bug',
                state: 'open'
              });

              const issueBody = `## ${emoji} Self-Test Failed

            | Check | Status |
            |-------|--------|
            | Build | ${buildStatus === 'success' ? ':white_check_mark:' : ':x:'} ${errors} errors, ${warnings} warnings |
            | Tests | ${testStatus === 'success' ? ':white_check_mark:' : ':x:'} ${passed} passed, ${failed} failed |
            | Code Health | ${todos} TODOs, ${largeFiles} large files |

            [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            This issue was created automatically by the self-test loop.`;

              // Only create if no existing open issue
              const selfTestIssues = existing.data.filter(i => i.title.includes('Self-Test'));
              if (selfTestIssues.length === 0) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `Self-Test Failed - ${new Date().toISOString().split('T')[0]}`,
                  body: issueBody,
                  labels: ['bug', 'automated', 'priority: high']
                });
              } else {
                // Update existing issue
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: selfTestIssues[0].number,
                  body: issueBody
                });
              }
            } else {
              // Close any open self-test failure issues
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'automated,bug',
                state: 'open'
              });

              for (const issue of existing.data.filter(i => i.title.includes('Self-Test'))) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `:white_check_mark: Self-test is passing again. Auto-closing.`
                });
              }
            }
