          WIKI

          # Enemy Types page
          cat > wiki/Enemy-Types.md << 'WIKI'
          # Enemy Types

          ## Wolf
          - **HP**: 35 | **Damage**: 6 | **Speed**: Fast
          - Fast and aggressive pack hunters
          - Found near the starting area
          - Drops: Wolf Pelt, Leather, Herbs

          ## Bandit
          - **HP**: 60 | **Damage**: 10 | **Speed**: Medium
          - Balanced fighters with decent equipment
          - Found in mid-range areas
          - Drops: Gold, Weapons, Iron Ore, Cloth

          ## Skeleton
          - **HP**: 80 | **Damage**: 15 | **Speed**: Slow
          - Heavy hitters but slow movers
          - Found in distant areas
          - Drops: Bones, Iron Ore, Armor, Mana Potions

          ## Troll
          - **HP**: 200 | **Damage**: 25 | **Speed**: Very Slow
          - Mini-boss encounter, extremely dangerous
          - Single spawn in eastern hills
          - Drops: Troll Hide, Rare items, lots of Gold

          ## Respawning
          All enemies respawn 45 seconds after being killed at their original spawn point.
          WIKI

          # Items and Crafting page
          cat > wiki/Items-and-Crafting.md << 'WIKI'
