          WIKI

          # Game Systems page
          cat > wiki/Game-Systems.md << 'WIKI'
          # Game Systems

          ## ECS Architecture
          Custom Entity Component System with priority-based system execution.

          ## Systems (execution order)
          | Priority | System | Description |
          |----------|--------|-------------|
          | 5 | Input | Player input handling |
          | 8 | Weather | Dynamic weather transitions |
          | 10 | Movement | Player movement + terrain clamping |
          | 12 | Equipment | Apply equipment stat bonuses |
          | 15 | Combat | Player combat actions |
          | 20 | Enemy AI | Patrol/Chase/Attack behavior |
          | 25 | Inventory | Loot drops, pickup, use items |
          | 26 | Quest | Quest tracking and rewards |
          | 28 | Leveling | XP, levels, skill allocation |
          | 30 | Magic | Spell casting and effects |
          | 40 | Terrain | Chunk streaming |
          | 42 | Sky | Day/night sky rendering |
          | 44 | Vegetation | Tree/rock spawning |
          | 46 | Enemy Spawner | Enemy spawning + respawning |
          | 50 | Dialogue | NPC interaction |
          | 60 | Dungeon | Procedural dungeon generation |
          | 80 | Rendering | OpenGL rendering pipeline |
          | 90 | HUD | Full game UI overlay |
          | 95 | Audio | Procedural music + SFX |

          ## Skill Tree
          - **Strength**: +3 attack damage per point (max 20)
          - **Endurance**: +15 max health per point (max 20)
          - **Agility**: +0.5 speed, -0.05s cooldown per point (max 20)
          WIKI

          # Development Guide
          cat > wiki/Development-Guide.md << 'WIKI'
          # Development Guide

          ## Build
          ```bash
          dotnet restore
          dotnet build
          dotnet test
          dotnet run --project src/CongCraft.Game
          ```

          ## Native AOT Publish
          ```bash
          dotnet publish src/CongCraft.Game/CongCraft.Game.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --output ./publish
          ```

          ## CI/CD Pipeline
          - **Push/PR** → CI (build + test + coverage)
          - **Quality Gate** → Formatting + warnings + coverage threshold
          - **Auto-Merge** → Squash merge when all checks pass
          - **Release** → Tag `v*` triggers multi-platform build
          - **Self-Test** → Every 6 hours health check
          - **Auto-Fix** → Formatting issues fixed automatically

          ## Autonomous Workflow
          1. Push code → Auto-PR created
          2. CI runs → Quality gate checks
          3. All green → Auto-approved + merged
          4. Tag version → Release built for Windows/macOS/Linux
          5. Release published → Feedback issue created
          6. User approves → Next cycle begins
          WIKI

          # Architecture page
          cat > wiki/Architecture.md << 'WIKI'
          # Architecture

          ## Tech Stack
          - **.NET 8** with Native AOT compilation
          - **OpenGL 3.3** via Silk.NET
          - **No game engine** — all systems hand-crafted

          ## Project Structure
          ```
          CongCraft.sln
          ├── src/CongCraft.Engine/   (Class Library)
          │   ├── Audio/              Procedural audio & music
          │   ├── Boss/               Boss fight mechanics
          │   ├── Combat/             Combat + Enemy AI + Spawning
          │   ├── Core/               Engine, ServiceLocator, GameTime
          │   ├── Crafting/           Stations & recipes
          │   ├── Dialogue/           NPC dialogue trees
          │   ├── Dungeon/            Procedural dungeon generation
          │   ├── ECS/                Entity Component System
          │   ├── Environment/        Day/night cycle
          │   ├── Inventory/          Items, equipment, loot
          │   ├── Leveling/           XP, levels, skill trees
          │   ├── Magic/              Spells & mana
          │   ├── Quest/              Quest system
          │   ├── Rendering/          OpenGL, shaders, camera
          │   ├── SaveLoad/           JSON save/load (AOT-safe)
          │   ├── Terrain/            Procedural terrain
          │   ├── UI/                 HUD components
          │   ├── VFX/                Particle effects
          │   └── Weather/            Weather system
          ├── src/CongCraft.Game/     (Executable entry point)
          └── tests/CongCraft.Engine.Tests/  (xUnit)
          ```

          ## Key Design Decisions
          - **AOT-Safe**: No reflection, System.Text.Json source generators
          - **Priority System**: Lower priority = runs first
          - **Singleton Components**: Global state (InputState, Camera, Lighting)
          - **Procedural Everything**: Terrain, meshes, audio, dungeons
          WIKI

      - name: Push Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd wiki
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git fetch origin main 2>/dev/null || true
          git checkout -b main
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to push"
          else
            git commit -m "Auto-update wiki from source"
            git push -f origin main
          fi
