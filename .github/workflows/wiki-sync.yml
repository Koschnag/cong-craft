name: Wiki Auto-Sync

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'CLAUDE.md'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

jobs:
  sync-wiki:
    name: Generate & Sync Wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Wiki Pages
        run: |
          mkdir -p wiki

          # Home page
          cat > wiki/Home.md << 'WIKI'
          # CongCraft Wiki

          Welcome to the CongCraft development wiki! This wiki is auto-generated from the source code.

          ## Quick Links
          - [Game Systems](Game-Systems)
          - [Controls](Controls)
          - [Items & Crafting](Items-and-Crafting)
          - [Quests](Quests)
          - [Enemy Types](Enemy-Types)
          - [Development Guide](Development-Guide)
          - [Architecture](Architecture)
          WIKI

          # Controls page
          cat > wiki/Controls.md << 'WIKI'
          # Controls

          ## Movement
          | Key | Action |
          |-----|--------|
          | WASD | Move |
          | Mouse | Look around |
          | Shift | Run |

          ## Combat
