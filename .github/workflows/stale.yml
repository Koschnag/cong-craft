name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in 30 days. It will be closed in 7 days if no further activity occurs.
            If this is still relevant, please comment or remove the stale label.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            activity in 14 days. It will be closed in 7 days if no further activity occurs.
          close-issue-message: 'Closed due to inactivity. Reopen if still needed.'
          close-pr-message: 'Closed due to inactivity. Reopen if still needed.'
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,epic,priority: critical'
          exempt-pr-labels: 'pinned,work-in-progress'
