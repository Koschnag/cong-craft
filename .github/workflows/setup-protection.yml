name: Setup Branch Protection

on:
  workflow_dispatch:

permissions:
  contents: read
  administration: write

jobs:
  protect:
    name: Configure Branch Protection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Setup branch protection for main
            try {
              await github.rest.repos.updateBranchProtection({
                owner, repo,
                branch: 'main',
                required_status_checks: {
                  strict: true,
                  contexts: [
                    'Build & Test',
                    'Code Quality',
                    'Quality Result'
                  ]
                },
                enforce_admins: false,
                required_pull_request_reviews: null, // Auto-merge handles this
                restrictions: null,
                allow_force_pushes: false,
                allow_deletions: false
              });
              core.info('Branch protection configured for main');
            } catch (e) {
              core.warning(`Could not set branch protection: ${e.message}`);
              core.info('This may require admin access or GitHub Pro/Team plan.');
            }

            // Create repository variables for automation
            const variables = [
              { name: 'AWAITING_FEEDBACK', value: 'false' },
              { name: 'FEEDBACK_VERSION', value: '' },
              { name: 'AUTO_MERGE_ENABLED', value: 'true' },
              { name: 'COVERAGE_THRESHOLD', value: '30' },
            ];

            for (const { name, value } of variables) {
              try {
                await github.rest.actions.createOrUpdateRepoVariable({
                  owner, repo, name, value
                });
                core.info(`Variable set: ${name}=${value}`);
              } catch (e) {
                core.info(`Could not set ${name}: ${e.message}`);
              }
            }
