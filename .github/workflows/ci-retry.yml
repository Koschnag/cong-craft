name: CI Auto-Fix Retry Loop

# When CI or Quality Gate fails on a PR, attempt to fix and retry
# Loops until all tests pass or 2-hour timeout
on:
  workflow_run:
    workflows: ["CI", "Code Quality Enforcement"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: write

# Only one retry loop per PR branch at a time
concurrency:
  group: ci-retry-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  retry-fix:
    name: Auto-Fix & Retry
    runs-on: ubuntu-latest
    # Only run when a PR workflow FAILED (not on success)
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    timeout-minutes: 120
    steps:
      - name: Find PR for this branch
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const headBranch = context.payload.workflow_run.head_branch;

            const prs = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              head: `${owner}:${headBranch}`
            });

            if (prs.data.length === 0) {
              core.info('No open PR found - skipping retry');
              core.setOutput('found', 'false');
              return;
            }

            const pr = prs.data[0];

            // Only auto-fix PRs from owner or bots (not external contributors)
            const isOwner = pr.user.login === owner;
            const isBot = pr.user.type === 'Bot';
            const isSameRepo = pr.head.repo?.full_name === `${owner}/${repo}`;
            if (!isOwner && !isBot && !isSameRepo) {
              core.info(`PR from external contributor ${pr.user.login} - skip auto-fix`);
              core.setOutput('found', 'false');
              return;
            }

            // Don't retry PRs labeled as blocked or WIP
            const labels = pr.labels.map(l => l.name);
            if (labels.includes('blocked') || labels.includes('work-in-progress')) {
              core.info('PR is blocked/WIP - skip auto-fix');
              core.setOutput('found', 'false');
              return;
            }

            // Check retry count - stop after 5 attempts to avoid infinite loops
            const comments = await github.rest.issues.listComments({
              owner, repo,
              issue_number: pr.number
            });
            const retryComments = comments.data.filter(c =>
              c.user.type === 'Bot' && c.body.includes('Auto-Fix Retry')
            );

            if (retryComments.length >= 5) {
              core.info(`PR #${pr.number} has ${retryComments.length} retry attempts - escalating to Claude Code`);
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: pr.number,
                body: [
                  '## Auto-Fix Retry Limit Reached :stop_sign: → Escalating to Claude Code :robot:',
                  '',
                  `After ${retryComments.length} attempts, the formatting auto-fix could not resolve all issues.`,
                  'Dispatching Claude Code AI to analyze and fix the failures...',
                  '',
                  `[View latest run](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`
                ].join('\n')
              });

              // Dispatch Claude Code to fix the CI failures
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo,
                  workflow_id: 'claude-fix-ci.yml',
                  ref: 'main',
                  inputs: {
                    pr_number: String(pr.number),
                    failure_type: 'unknown'
                  }
                });
                core.info(`Dispatched Claude Code CI fix for PR #${pr.number}`);
              } catch (e) {
                core.warning(`Could not dispatch Claude Code: ${e.message}`);
                // Fall back to blocking label if dispatch fails
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: pr.number,
                  labels: ['blocked']
                });
              }

              core.setOutput('found', 'false');
              return;
            }

            core.setOutput('found', 'true');
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('branch', headBranch);
            core.setOutput('attempt', String(retryComments.length + 1));

      - name: Checkout PR branch
        if: steps.find-pr.outputs.found == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.find-pr.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        if: steps.find-pr.outputs.found == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        if: steps.find-pr.outputs.found == 'true'
        run: dotnet restore

      # --- Phase 1: Fix formatting ---
      - name: Fix formatting
        if: steps.find-pr.outputs.found == 'true'
        id: format
        run: |
          dotnet format 2>&1 | tee format-log.txt
          CHANGED=$(git diff --name-only | wc -l)
          echo "fixed=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED" -gt "0" ]; then
            echo "Formatting fixed $CHANGED files"
          fi

      # --- Phase 2: Try build ---
      - name: Build
        if: steps.find-pr.outputs.found == 'true'
        id: build
        run: |
          if dotnet build --configuration Release --no-restore 2>&1 | tee build-log.txt; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi
          WARNINGS=$(grep -c "warning " build-log.txt || true)
          ERRORS=$(grep -c ": error " build-log.txt || true)
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"

      # --- Phase 3: Run tests ---
      - name: Run tests
        if: steps.find-pr.outputs.found == 'true' && steps.build.outputs.status == 'success'
        id: test
        run: |
          TEST_OUTPUT=$(dotnet test --configuration Release --no-build \
            --logger "trx;LogFileName=retry-results.trx" \
            --verbosity normal 2>&1) || true
          echo "$TEST_OUTPUT" | tee test-log.txt

          PASSED=$(echo "$TEST_OUTPUT" | grep -oP 'Passed:\s*\K\d+' || echo "0")
          FAILED=$(echo "$TEST_OUTPUT" | grep -oP 'Failed:\s*\K\d+' || echo "0")
          TOTAL=$((PASSED + FAILED))
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq "0" ] && [ "$PASSED" -gt "0" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      # --- Phase 4: Push fixes if any were made ---
      - name: Push fixes
        if: steps.find-pr.outputs.found == 'true' && steps.format.outputs.fixed != '0'
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "style: auto-fix formatting (retry attempt ${{ steps.find-pr.outputs.attempt }})

          Applied dotnet format to fix code style issues.
          Auto-retry loop attempt ${{ steps.find-pr.outputs.attempt }}/5."

            git push origin ${{ steps.find-pr.outputs.branch }}
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "Pushed formatting fixes - CI will re-trigger"
          fi

      # --- Phase 5: Report status ---
      - name: Report retry status
        if: steps.find-pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = parseInt('${{ steps.find-pr.outputs.pr_number }}');
            const attempt = '${{ steps.find-pr.outputs.attempt }}';
            const buildStatus = '${{ steps.build.outputs.status }}' || 'skipped';
            const testStatus = '${{ steps.test.outputs.status }}' || 'skipped';
            const passed = '${{ steps.test.outputs.passed }}' || '0';
            const failed = '${{ steps.test.outputs.failed }}' || '0';
            const formatFixed = '${{ steps.format.outputs.fixed }}' || '0';
            const pushed = '${{ steps.push.outputs.pushed }}' === 'true';
            const buildErrors = '${{ steps.build.outputs.errors }}' || '0';
            const buildWarnings = '${{ steps.build.outputs.warnings }}' || '0';

            const allGreen = buildStatus === 'success' && testStatus === 'success';

            const lines = [
              `## Auto-Fix Retry ${allGreen ? ':white_check_mark:' : ':wrench:'} (Attempt ${attempt}/5)`,
              '',
              '| Check | Result |',
              '|-------|--------|',
              `| Build | ${buildStatus === 'success' ? ':white_check_mark:' : ':x:'} ${buildErrors} errors, ${buildWarnings} warnings |`,
              `| Tests | ${testStatus === 'success' ? ':white_check_mark:' : ':x:'} ${passed} passed, ${failed} failed |`,
              `| Formatting | ${formatFixed === '0' ? ':white_check_mark: clean' : ':wrench: fixed ' + formatFixed + ' files'} |`,
              '',
            ];

            if (allGreen) {
              lines.push(':rocket: **All checks passing!** Auto-merge will evaluate this PR.');
            } else if (pushed) {
              lines.push(':arrows_counterclockwise: Formatting fixes pushed. CI will re-run automatically.');
              lines.push(`Next retry will be attempt ${parseInt(attempt) + 1}/5.`);
            } else if (buildStatus === 'failure') {
              lines.push(':x: **Build failure** - escalating to Claude Code :robot:');
            } else if (testStatus === 'failure') {
              lines.push(`:x: **${failed} test(s) failing** - escalating to Claude Code :robot:`);
            }

            lines.push('');
            lines.push(`[View run](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`);

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: prNumber,
              body: lines.join('\n')
            });

            // If build fails or tests fail and no formatting was fixed, escalate to Claude Code
            if (!allGreen && !pushed) {
              const failureType = buildStatus === 'failure' ? 'build' : 'test';
              core.info(`Dispatching Claude Code to fix ${failureType} failures`);
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo,
                  workflow_id: 'claude-fix-ci.yml',
                  ref: 'main',
                  inputs: {
                    pr_number: String(prNumber),
                    failure_type: failureType
                  }
                });
              } catch (e) {
                core.warning(`Could not dispatch Claude Code: ${e.message}`);
              }
            }

            // If all green and we pushed fixes, dispatch auto-merge
            if (allGreen) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo,
                  workflow_id: 'auto-merge.yml',
                  ref: 'main',
                  inputs: { pr_number: String(prNumber) }
                });
                core.info('Dispatched auto-merge evaluation');
              } catch (e) {
                core.info(`Could not dispatch auto-merge: ${e.message}`);
              }
            }
