name: Auto Approve & Merge

# Triggers:
# 1. After CI or Quality Gate completes (workflow_run)
# 2. When user approves a PR (pull_request_review)
# 3. Manual dispatch
on:
  workflow_run:
    workflows: ["CI", "Code Quality Enforcement"]
    types: [completed]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to evaluate'
        required: true
        type: number

# Serialize per-PR to avoid race conditions between CI and Quality Gate completing
concurrency:
  group: auto-merge-${{ github.event.workflow_run.head_branch || github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: read

jobs:
  auto-merge:
    name: Evaluate & Merge
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request_review' ||
      (github.event.workflow_run.event == 'pull_request' &&
       github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Find the PR number based on trigger type
            let prNumber;
            if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt('${{ github.event.inputs.pr_number }}');
            } else if (context.eventName === 'pull_request_review') {
              prNumber = context.payload.pull_request.number;
            } else {
              // workflow_run: find PR from the head branch
              const headBranch = context.payload.workflow_run.head_branch;
              const prs = await github.rest.pulls.list({
                owner, repo,
                state: 'open',
                head: `${owner}:${headBranch}`
              });
              if (prs.data.length === 0) {
                core.info('No open PR found for this branch');
                return;
              }
              prNumber = prs.data[0].number;
            }

            core.info(`Evaluating PR #${prNumber}`);

            // Get PR details
            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            // Skip if already merged or closed
            if (pr.data.merged || pr.data.state === 'closed') {
              core.info('PR already merged or closed');
              return;
            }

            // Skip draft PRs
            if (pr.data.draft) {
              core.info('PR is draft, skipping');
              return;
            }

            // Security: Only auto-merge PRs from repo owner or bots (not external forks)
            const prAuthor = pr.data.user.login;
            const isOwner = prAuthor === context.repo.owner;
            const isBot = pr.data.user.type === 'Bot';
            const isSameRepo = pr.data.head.repo?.full_name === `${owner}/${repo}`;
            if (!isOwner && !isBot && !isSameRepo) {
              core.info(`PR author ${prAuthor} is external - requires manual review, skipping auto-merge.`);
              return;
            }

            // Skip PRs with blocking labels
            const labels = pr.data.labels.map(l => l.name);
            if (labels.includes('work-in-progress') || labels.includes('blocked')) {
              core.info('PR is WIP or blocked, skipping');
              return;
            }

            // Check ALL status checks on the PR head commit
            const checks = await github.rest.checks.listForRef({
              owner, repo,
              ref: pr.data.head.sha
            });

            const ignoredChecks = [
              'Evaluate & Merge',
              'Auto Approve & Merge',
              'Auto Label & Triage',
              'Project Board Automation',
            ];

            const relevantChecks = checks.data.check_runs.filter(c =>
              !ignoredChecks.includes(c.name)
            );

            // Bug 11 fix: Require at least one meaningful check to exist
            // This prevents merging PRs that have no CI results yet
            const requiredCheckNames = ['Build & Test'];
            const hasRequiredCheck = relevantChecks.some(c =>
              requiredCheckNames.includes(c.name)
            );
            if (!hasRequiredCheck) {
              core.info(`No required checks found yet (need one of: ${requiredCheckNames.join(', ')}). Waiting for CI.`);
              return;
            }

            const failedChecks = relevantChecks.filter(c =>
              c.status === 'completed' &&
              c.conclusion !== 'success' &&
              c.conclusion !== 'skipped' &&
              c.conclusion !== 'neutral'
            );

            const pendingChecks = relevantChecks.filter(c =>
              c.status !== 'completed'
            );

            if (pendingChecks.length > 0) {
              core.info(`${pendingChecks.length} checks still pending: ${pendingChecks.map(c => c.name).join(', ')}`);
              core.info('Will re-evaluate when remaining checks complete.');
              return;
            }

            if (failedChecks.length > 0) {
              core.info(`${failedChecks.length} checks failed: ${failedChecks.map(c => `${c.name} (${c.conclusion})`).join(', ')}`);
              return;
            }

            // All checks passed - now approve and merge
            core.info('All checks passed! Auto-approving and merging.');

            // Check if already approved by a human or bot
            const reviews = await github.rest.pulls.listReviews({
              owner, repo,
              pull_number: prNumber
            });

            const hasApproval = reviews.data.some(r => r.state === 'APPROVED');

            if (!hasApproval) {
              try {
                await github.rest.pulls.createReview({
                  owner, repo,
                  pull_number: prNumber,
                  event: 'APPROVE',
                  body: '## Auto-Approved\n\nAll quality gates passed:\n- Build & Test: OK\n- Code Quality: OK\n\nAuto-merging...'
                });
              } catch (e) {
                // GITHUB_TOKEN cannot always approve its own PRs.
                // With required_approving_review_count: 0, this is OK.
                core.info(`Could not auto-approve (expected for bot PRs): ${e.message}`);
              }
            }

            // Merge with squash
            try {
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });

              core.info(`PR #${prNumber} merged successfully`);

              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body: '## Merged Automatically\n\nAll quality gates passed. Changes have been squash-merged into `main`.\n\nA version tag will be created automatically to trigger the release pipeline.'
              });
            } catch (e) {
              core.warning(`Failed to merge: ${e.message}`);
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body: `## Auto-Merge Failed\n\nCould not merge: \`${e.message}\`\n\nPlease merge manually or resolve conflicts.`
              });
            }
