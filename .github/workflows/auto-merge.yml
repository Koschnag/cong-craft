name: Auto Approve & Merge

# Only runs AFTER CI and Quality Gate complete - avoids race condition
on:
  workflow_run:
    workflows: ["CI", "Code Quality Enforcement"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to evaluate'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: read

jobs:
  auto-merge:
    name: Evaluate & Merge
    runs-on: ubuntu-latest
    # Only run if triggered by completed workflow on a PR, or manual dispatch
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'pull_request' &&
       github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;

            // Find the PR number
            let prNumber;
            if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt('${{ github.event.inputs.pr_number }}');
            } else {
              // Get PRs associated with the head branch of the workflow run
              const headBranch = context.payload.workflow_run.head_branch;
              const prs = await github.rest.pulls.list({
                owner, repo,
                state: 'open',
                head: `${owner}:${headBranch}`
              });
              if (prs.data.length === 0) {
                core.info('No open PR found for this branch');
                return;
              }
              prNumber = prs.data[0].number;
            }

            core.info(`Evaluating PR #${prNumber}`);

            // Get PR details
            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            // Skip draft PRs
            if (pr.data.draft) {
              core.info('PR is draft, skipping');
              return;
            }

            // Skip PRs with blocking labels
            const labels = pr.data.labels.map(l => l.name);
            if (labels.includes('work-in-progress') || labels.includes('blocked')) {
              core.info('PR is WIP or blocked, skipping');
              return;
            }

            // Check ALL status checks on the PR head commit
            const checks = await github.rest.checks.listForRef({
              owner, repo,
              ref: pr.data.head.sha
            });

            const ignoredChecks = [
              'Evaluate & Merge',      // This workflow
              'Auto Approve & Merge',  // Legacy name
            ];

            const relevantChecks = checks.data.check_runs.filter(c =>
              !ignoredChecks.includes(c.name)
            );

            const failedChecks = relevantChecks.filter(c =>
              c.status === 'completed' &&
              c.conclusion !== 'success' &&
              c.conclusion !== 'skipped' &&
              c.conclusion !== 'neutral'
            );

            const pendingChecks = relevantChecks.filter(c =>
              c.status !== 'completed'
            );

            if (pendingChecks.length > 0) {
              core.info(`${pendingChecks.length} checks still pending: ${pendingChecks.map(c => c.name).join(', ')}`);
              core.info('Will re-evaluate when remaining checks complete.');
              return;
            }

            if (failedChecks.length > 0) {
              core.info(`${failedChecks.length} checks failed: ${failedChecks.map(c => c.name).join(', ')}`);
              return;
            }

            // All checks passed - approve and merge
            core.info('All checks passed! Auto-approving and merging.');

            // Check if already approved
            const reviews = await github.rest.pulls.listReviews({
              owner, repo,
              pull_number: prNumber
            });

            const hasApproval = reviews.data.some(r => r.state === 'APPROVED');

            if (!hasApproval) {
              try {
                await github.rest.pulls.createReview({
                  owner, repo,
                  pull_number: prNumber,
                  event: 'APPROVE',
                  body: '## Auto-Approved\n\nAll quality gates passed:\n- Build & Test: OK\n- Code Quality: OK\n\nAuto-merging...'
                });
              } catch (e) {
                core.info(`Could not auto-approve (may need different token): ${e.message}`);
              }
            }

            // Merge
            try {
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });

              core.info(`PR #${prNumber} merged successfully`);

              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body: '## Merged Automatically\n\nAll quality gates passed. Changes have been squash-merged into `main`.'
              });
            } catch (e) {
              core.warning(`Failed to merge: ${e.message}`);
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body: `## Auto-Merge Failed\n\nCould not merge: \`${e.message}\`\n\nPlease merge manually or resolve conflicts.`
              });
            }
