name: Repository Metrics

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  metrics:
    name: Generate Metrics Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & build
        run: dotnet restore && dotnet build --configuration Release --no-restore

      - name: Count stats
        id: stats
        run: |
          echo "src_files=$(find src -name '*.cs' | wc -l)" >> "$GITHUB_OUTPUT"
          echo "test_files=$(find tests -name '*.cs' | wc -l)" >> "$GITHUB_OUTPUT"
          echo "src_lines=$(find src -name '*.cs' -exec cat {} + | wc -l)" >> "$GITHUB_OUTPUT"
          echo "test_lines=$(find tests -name '*.cs' -exec cat {} + | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Run tests and count
        id: tests
        run: |
          OUTPUT=$(dotnet test --configuration Release --no-build --verbosity minimal 2>&1 || true)
          PASSED=$(echo "$OUTPUT" | grep -oP 'Passed:\s*\K\d+' || echo "0")
          FAILED=$(echo "$OUTPUT" | grep -oP 'Failed:\s*\K\d+' || echo "0")
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Create/update metrics issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Weekly Project Metrics';
            const date = new Date().toISOString().split('T')[0];
            const body = [
              `## Project Metrics - ${date}`,
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Source Files | ${{ steps.stats.outputs.src_files }} |`,
              `| Test Files | ${{ steps.stats.outputs.test_files }} |`,
              `| Source Lines | ${{ steps.stats.outputs.src_lines }} |`,
              `| Test Lines | ${{ steps.stats.outputs.test_lines }} |`,
              `| Tests Passed | ${{ steps.tests.outputs.passed }} |`,
              `| Tests Failed | ${{ steps.tests.outputs.failed }} |`,
              '',
              `[View full run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'metrics',
              state: 'open'
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['metrics', 'automated']
              });
            }
