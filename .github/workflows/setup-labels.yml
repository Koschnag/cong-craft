name: Setup Repository Labels

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const labels = [
              // Type
              { name: 'bug', color: 'd73a4a', description: 'Something is broken' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or improvement' },
              { name: 'task', color: '0075ca', description: 'Development task or chore' },
              { name: 'epic', color: '5319e7', description: 'Large feature spanning multiple tasks' },
              { name: 'documentation', color: '0075ca', description: 'Documentation improvements' },
              { name: 'question', color: 'd876e3', description: 'Question or discussion' },

              // Priority
              { name: 'priority: critical', color: 'b60205', description: 'Must fix immediately' },
              { name: 'priority: high', color: 'd93f0b', description: 'Fix in current sprint' },
              { name: 'priority: medium', color: 'fbca04', description: 'Fix soon' },
              { name: 'priority: low', color: '0e8a16', description: 'Nice to have' },

              // Status
              { name: 'needs-triage', color: 'e4e669', description: 'Needs review and prioritization' },
              { name: 'in-progress', color: '1d76db', description: 'Currently being worked on' },
              { name: 'blocked', color: 'b60205', description: 'Blocked by another issue' },
              { name: 'ready-for-review', color: '0e8a16', description: 'Ready to be reviewed' },
              { name: 'stale', color: 'ffffff', description: 'No recent activity' },
              { name: 'pinned', color: '006b75', description: 'Exempt from stale bot' },
              { name: 'work-in-progress', color: 'fbca04', description: 'Not ready for review' },

              // Area
              { name: 'area: engine', color: 'c5def5', description: 'Core engine code' },
              { name: 'area: game', color: 'c5def5', description: 'Game entry point' },
              { name: 'area: rendering', color: 'c5def5', description: 'Graphics & rendering' },
              { name: 'area: combat', color: 'c5def5', description: 'Combat system' },
              { name: 'area: magic', color: 'c5def5', description: 'Magic & spells' },
              { name: 'area: quest-system', color: 'c5def5', description: 'Quests & dialogue' },
              { name: 'area: inventory', color: 'c5def5', description: 'Inventory & equipment' },
              { name: 'area: world-gen', color: 'c5def5', description: 'World generation & terrain' },
              { name: 'area: audio', color: 'c5def5', description: 'Audio & music' },
              { name: 'area: save-system', color: 'c5def5', description: 'Save/load system' },
              { name: 'area: devops', color: 'c5def5', description: 'CI/CD & infrastructure' },
              { name: 'area: tests', color: 'c5def5', description: 'Test suite' },

              // Size
              { name: 'size: XS', color: '009900', description: '< 10 lines changed' },
              { name: 'size: S', color: '77bb00', description: '10-50 lines changed' },
              { name: 'size: M', color: 'eebb00', description: '50-200 lines changed' },
              { name: 'size: L', color: 'ee9900', description: '200-500 lines changed' },
              { name: 'size: XL', color: 'ee5500', description: '500+ lines changed' },

              // Automation
              { name: 'dependencies', color: '0366d6', description: 'Dependency updates' },
              { name: 'automated', color: 'ededed', description: 'Created by automation' },
              { name: 'ci-cd', color: 'bfd4f2', description: 'CI/CD related' },
              { name: 'nightly-failure', color: 'b60205', description: 'Nightly build failure' },
              { name: 'metrics', color: 'bfd4f2', description: 'Project metrics' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label
                });
                console.log(`Created: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label
                  });
                  console.log(`Updated: ${label.name}`);
                }
              }
            }
