name: Bootstrap Repository

# Runs automatically when this workflow file first appears on main
# Sets up all labels, protection rules, project board, and variables
on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write
  repository-projects: write

jobs:
  setup-labels:
    name: Setup Labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const labels = [
              // Type
              { name: 'bug', color: 'd73a4a', description: 'Something is broken' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or improvement' },
              { name: 'task', color: '0075ca', description: 'Development task or chore' },
              { name: 'epic', color: '5319e7', description: 'Large feature spanning multiple tasks' },
              { name: 'documentation', color: '0075ca', description: 'Documentation improvements' },
              { name: 'question', color: 'd876e3', description: 'Question or discussion' },
              { name: 'vision', color: '7057ff', description: 'Product vision or direction' },

              // Priority
              { name: 'priority: critical', color: 'b60205', description: 'Must fix immediately' },
              { name: 'priority: high', color: 'd93f0b', description: 'Fix in current sprint' },
              { name: 'priority: medium', color: 'fbca04', description: 'Fix soon' },
              { name: 'priority: low', color: '0e8a16', description: 'Nice to have' },

              // Status
              { name: 'needs-triage', color: 'e4e669', description: 'Needs review and prioritization' },
              { name: 'in-progress', color: '1d76db', description: 'Currently being worked on' },
              { name: 'blocked', color: 'b60205', description: 'Blocked by another issue' },
              { name: 'ready-for-review', color: '0e8a16', description: 'Ready to be reviewed' },
              { name: 'stale', color: 'ffffff', description: 'No recent activity' },
              { name: 'pinned', color: '006b75', description: 'Exempt from stale bot' },
              { name: 'work-in-progress', color: 'fbca04', description: 'Not ready for review' },
              { name: 'feedback-required', color: 'ff6600', description: 'Waiting for user feedback' },

              // Area
              { name: 'area: engine', color: 'c5def5', description: 'Core engine code' },
              { name: 'area: game', color: 'c5def5', description: 'Game entry point' },
              { name: 'area: rendering', color: 'c5def5', description: 'Graphics & rendering' },
              { name: 'area: combat', color: 'c5def5', description: 'Combat system' },
              { name: 'area: magic', color: 'c5def5', description: 'Magic & spells' },
              { name: 'area: quest-system', color: 'c5def5', description: 'Quests & dialogue' },
              { name: 'area: inventory', color: 'c5def5', description: 'Inventory & equipment' },
              { name: 'area: world-gen', color: 'c5def5', description: 'World generation & terrain' },
              { name: 'area: audio', color: 'c5def5', description: 'Audio & music' },
              { name: 'area: save-system', color: 'c5def5', description: 'Save/load system' },
              { name: 'area: devops', color: 'c5def5', description: 'CI/CD & infrastructure' },
              { name: 'area: tests', color: 'c5def5', description: 'Test suite' },
              { name: 'area: ui', color: 'c5def5', description: 'User interface & HUD' },
              { name: 'area: dungeon', color: 'c5def5', description: 'Dungeon generation' },
              { name: 'area: weather', color: 'c5def5', description: 'Weather system' },
              { name: 'area: crafting', color: 'c5def5', description: 'Crafting system' },

              // Size
              { name: 'size: XS', color: '009900', description: '< 10 lines changed' },
              { name: 'size: S', color: '77bb00', description: '10-50 lines changed' },
              { name: 'size: M', color: 'eebb00', description: '50-200 lines changed' },
              { name: 'size: L', color: 'ee9900', description: '200-500 lines changed' },
              { name: 'size: XL', color: 'ee5500', description: '500+ lines changed' },

              // Automation
              { name: 'dependencies', color: '0366d6', description: 'Dependency updates' },
              { name: 'automated', color: 'ededed', description: 'Created by automation' },
              { name: 'ci-cd', color: 'bfd4f2', description: 'CI/CD related' },
              { name: 'nightly-failure', color: 'b60205', description: 'Nightly build failure' },
              { name: 'metrics', color: 'bfd4f2', description: 'Project metrics' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label
                });
                console.log(`Created: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label
                  });
                  console.log(`Updated: ${label.name}`);
                }
              }
            }

  setup-variables:
    name: Setup Repository Variables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const variables = [
              { name: 'AWAITING_FEEDBACK', value: 'false' },
              { name: 'FEEDBACK_VERSION', value: '' },
              { name: 'AUTO_MERGE_ENABLED', value: 'true' },
              { name: 'COVERAGE_THRESHOLD', value: '30' },
            ];

            for (const { name, value } of variables) {
              try {
                await github.rest.actions.createOrUpdateRepoVariable({
                  owner, repo, name, value
                });
                core.info(`Variable set: ${name}=${value}`);
              } catch (e) {
                core.info(`Could not set ${name}: ${e.message}`);
              }
            }

  setup-protection:
    name: Setup Branch Protection
    runs-on: ubuntu-latest
    needs: [setup-labels, setup-variables]
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              await github.rest.repos.updateBranchProtection({
                owner, repo,
                branch: 'main',
                required_status_checks: {
                  strict: true,
                  contexts: ['Build & Test']
                },
                enforce_admins: false,
                required_pull_request_reviews: {
                  dismiss_stale_reviews: true,
                  require_code_owner_reviews: false,
                  required_approving_review_count: 0
                },
                restrictions: null,
                allow_force_pushes: false,
                allow_deletions: false
              });
              core.info('Branch protection configured');
            } catch (e) {
              core.warning(`Could not set protection: ${e.message}`);
            }

  create-welcome-issue:
    name: Create Welcome Issue
    runs-on: ubuntu-latest
    needs: [setup-labels]
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;

            // Check if welcome issue already exists
            const existing = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'pinned',
              state: 'open'
            });
            const hasWelcome = existing.data.some(i => i.title.includes('Project Board'));
            if (hasWelcome) return;

            await github.rest.issues.create({
              owner, repo,
              title: '📋 Project Board - CongCraft Development',
              body: `## CongCraft Development Board

            Use this repo's Issues as your project board. The automation handles everything else.

            ### How to Use

            **Create issues** with these formats - everything else is automatic:

            | What you want | How to create it |
            |--------------|-----------------|
            | Report a bug | New Issue → Bug Report template |
            | Request a feature | New Issue → Feature Request template |
            | Share your vision | New Issue → title starts with \`[VISION]\` |
            | Development task | New Issue → Task template |
            | Large feature plan | New Issue → Epic template |

            ### Vision Issues
            Create an issue starting with \`[VISION]\` and list your ideas:
            \`\`\`
            Title: [VISION] Open World Expansion

            - Groessere Spielwelt mit mehreren Regionen
            - Reittiere zum schnelleren Reisen
            - Dynamische Events in der Welt
            - NPC-Siedlungen mit Wirtschaftssystem
            \`\`\`
            Each bullet point becomes a separate trackable feature issue.

            ### Feedback on Releases
            After each release, a feedback issue is created automatically.
            Comment with \`Bug:\`, \`Idee:\`, \`Feature:\` prefixes to auto-create issues.
            Approve with 👍 or comment "passt" to trigger the next cycle.

            ---
            > This issue is pinned. Do not close.`,
              labels: ['pinned', 'documentation']
            });
