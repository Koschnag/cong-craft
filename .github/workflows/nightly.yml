name: Nightly Health Check

on:
  schedule:
    - cron: '0 3 * * *'  # Every day at 3 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: Nightly Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run full test suite
        run: |
          dotnet test --configuration Release --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=nightly-results.trx"

      - name: Upload nightly results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nightly-results-${{ github.run_number }}
          path: coverage/
          retention-days: 30

  cross-platform-build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            name: Linux x64
          - os: macos-14
            rid: osx-arm64
            name: macOS ARM64
          - os: windows-latest
            rid: win-x64
            name: Windows x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install native dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install glfw

      - name: Publish Native AOT
        run: >
          dotnet publish src/CongCraft.Game/CongCraft.Game.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --output ./publish

  notify-failure:
    name: Notify on Failure
    needs: [health-check, cross-platform-build]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly build failed - ${new Date().toISOString().split('T')[0]}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nightly-failure'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `The nightly build failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                labels: ['bug', 'nightly-failure', 'priority: high']
              });
            }
