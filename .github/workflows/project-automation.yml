name: Project Board Automation

on:
  issues:
    types: [opened, closed, reopened, labeled]
  pull_request:
    types: [opened, closed, reopened, review_requested, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  track-issue:
    name: Track in Project
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    permissions:
      issues: write
      repository-projects: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // Auto-add priority labels based on keywords in title/body
            const text = `${issue.title} ${issue.body || ''}`.toLowerCase();
            const newLabels = [];

            if (text.includes('crash') || text.includes('broken') || text.includes('critical')) {
              newLabels.push('priority: critical');
            } else if (text.includes('bug') || text.includes('error') || text.includes('fix')) {
              newLabels.push('priority: high');
            }

            // Auto-categorize by keywords
            const categories = {
              'area: rendering': ['render', 'shader', 'opengl', 'graphics', 'mesh', 'texture'],
              'area: combat': ['combat', 'attack', 'damage', 'enemy', 'health', 'dodge', 'block'],
              'area: quest-system': ['quest', 'dialogue', 'npc', 'objective'],
              'area: inventory': ['inventory', 'item', 'equipment', 'loot', 'crafting', 'recipe'],
              'area: magic': ['magic', 'spell', 'mana', 'fireball', 'shield'],
              'area: world-gen': ['terrain', 'procedural', 'world', 'dungeon', 'chunk'],
              'area: audio': ['audio', 'sound', 'music'],
              'area: save-system': ['save', 'load', 'serializ'],
              'area: devops': ['ci', 'build', 'pipeline', 'workflow', 'deploy'],
              'area: leveling': ['xp', 'experience', 'level', 'skill tree', 'skill point'],
              'area: weather': ['weather', 'rain', 'storm', 'fog', 'day/night'],
              'area: ui': ['hud', 'minimap', 'ui', 'menu', 'interface'],
            };

            for (const [label, keywords] of Object.entries(categories)) {
              if (keywords.some(k => text.includes(k))) {
                newLabels.push(label);
              }
            }

            if (newLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: newLabels
              });
            }

  welcome-contributor:
    name: Welcome New Contributors
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.issue.user.login;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator,
              state: 'all'
            });
            if (issues.data.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `Welcome to CongCraft, @${creator}! Thanks for opening your first issue. A maintainer will review it shortly.`
              });
            }

  process-inline-commands:
    name: Process Inline Commands
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment'
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body;
            const issueNumber = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Parse inline commands
            const lines = comment.split('\n');
            for (const line of lines) {
              const trimmed = line.trim();

              // Bug/Fehler: create bug issue
              const bugMatch = trimmed.match(/^(?:Bug|Fehler):\s*(.+)/i);
              if (bugMatch) {
                await github.rest.issues.create({
                  owner, repo,
                  title: `[BUG] ${bugMatch[1]}`,
                  body: `Reported from #${issueNumber} by @${context.payload.comment.user.login}`,
                  labels: ['bug', 'priority: high']
                });
              }

              // Idee/Feature/Vision: create feature issue
              const featureMatch = trimmed.match(/^(?:Idee|Feature|Vision):\s*(.+)/i);
              if (featureMatch) {
                await github.rest.issues.create({
                  owner, repo,
                  title: `[FEATURE] ${featureMatch[1]}`,
                  body: `Suggested from #${issueNumber} by @${context.payload.comment.user.login}`,
                  labels: ['enhancement']
                });
              }

              // /priority command
              const priorityMatch = trimmed.match(/^\/priority\s+(critical|high|medium|low)/i);
              if (priorityMatch) {
                const priority = priorityMatch[1].toLowerCase();
                // Remove existing priority labels
                const currentLabels = context.payload.issue.labels.map(l => l.name);
                for (const label of currentLabels) {
                  if (label.startsWith('priority:')) {
                    await github.rest.issues.removeLabel({
                      owner, repo, issue_number: issueNumber, name: label
                    }).catch(() => {});
                  }
                }
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issueNumber,
                  labels: [`priority: ${priority}`]
                });
              }

              // /label command
              const labelMatch = trimmed.match(/^\/label\s+(.+)/i);
              if (labelMatch) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issueNumber,
                  labels: [labelMatch[1].trim()]
                });
              }

              // /close or /done
              if (/^\/(?:close|done)$/i.test(trimmed)) {
                await github.rest.issues.update({
                  owner, repo, issue_number: issueNumber, state: 'closed'
                });
              }

              // /reopen
              if (/^\/reopen$/i.test(trimmed)) {
                await github.rest.issues.update({
                  owner, repo, issue_number: issueNumber, state: 'open'
                });
              }

              // /duplicate #N
              const dupMatch = trimmed.match(/^\/duplicate\s+#?(\d+)/i);
              if (dupMatch) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issueNumber,
                  labels: ['duplicate']
                });
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `Duplicate of #${dupMatch[1]}`
                });
                await github.rest.issues.update({
                  owner, repo, issue_number: issueNumber, state: 'closed'
                });
              }
            }
