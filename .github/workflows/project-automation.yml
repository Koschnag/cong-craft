name: Project Board Automation

on:
  issues:
    types: [opened, closed, reopened, labeled]
  pull_request:
    types: [opened, closed, reopened, review_requested, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  track-issue:
    name: Track in Project
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    permissions:
      issues: write
      repository-projects: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // Auto-add priority labels based on keywords in title/body
            const text = `${issue.title} ${issue.body || ''}`.toLowerCase();
            const newLabels = [];

            if (text.includes('crash') || text.includes('broken') || text.includes('critical')) {
              newLabels.push('priority: critical');
            } else if (text.includes('bug') || text.includes('error') || text.includes('fix')) {
              newLabels.push('priority: high');
            }

            // Auto-categorize by keywords
            if (text.includes('render') || text.includes('shader') || text.includes('opengl') || text.includes('graphics')) {
              newLabels.push('area: rendering');
            }
            if (text.includes('combat') || text.includes('attack') || text.includes('damage')) {
              newLabels.push('area: combat');
            }
            if (text.includes('quest') || text.includes('dialogue') || text.includes('npc')) {
              newLabels.push('area: quest-system');
            }
            if (text.includes('inventory') || text.includes('item') || text.includes('equipment')) {
              newLabels.push('area: inventory');
            }
            if (text.includes('magic') || text.includes('spell') || text.includes('mana')) {
              newLabels.push('area: magic');
            }
            if (text.includes('terrain') || text.includes('procedural') || text.includes('world')) {
              newLabels.push('area: world-gen');
            }
            if (text.includes('audio') || text.includes('sound') || text.includes('music')) {
              newLabels.push('area: audio');
            }
            if (text.includes('save') || text.includes('load') || text.includes('serializ')) {
              newLabels.push('area: save-system');
            }
            if (text.includes('ci') || text.includes('build') || text.includes('pipeline') || text.includes('workflow')) {
              newLabels.push('area: devops');
            }

            if (newLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: newLabels
              });
            }

  welcome-contributor:
    name: Welcome New Contributors
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.issue.user.login;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator,
              state: 'all'
            });
            if (issues.data.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `Welcome to CongCraft, @${creator}! Thanks for opening your first issue. A maintainer will review it shortly.`
              });
            }
