name: Project Board Automation

on:
  issues:
    types: [opened, closed, reopened, labeled]
  pull_request:
    types: [opened, closed, reopened, review_requested, ready_for_review]

jobs:
  track-issue:
    name: Track in Project
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    permissions:
      issues: write
      repository-projects: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // Auto-add priority labels based on keywords in title/body
            const text = `${issue.title} ${issue.body || ''}`.toLowerCase();
            const newLabels = [];

            if (text.includes('crash') || text.includes('broken') || text.includes('critical')) {
              newLabels.push('priority: critical');
            } else if (text.includes('bug') || text.includes('error') || text.includes('fix')) {
              newLabels.push('priority: high');
            }

            // Auto-categorize by keywords
            const categories = {
              'area: rendering': ['render', 'shader', 'opengl', 'graphics', 'mesh', 'texture'],
              'area: combat': ['combat', 'attack', 'damage', 'enemy', 'health', 'dodge', 'block'],
              'area: quest-system': ['quest', 'dialogue', 'npc', 'objective'],
              'area: inventory': ['inventory', 'item', 'equipment', 'loot', 'crafting', 'recipe'],
              'area: magic': ['magic', 'spell', 'mana', 'fireball', 'shield'],
              'area: world-gen': ['terrain', 'procedural', 'world', 'dungeon', 'chunk'],
              'area: audio': ['audio', 'sound', 'music'],
              'area: save-system': ['save', 'load', 'serializ'],
              'area: devops': ['ci', 'build', 'pipeline', 'workflow', 'deploy'],
              'area: leveling': ['xp', 'experience', 'level', 'skill tree', 'skill point'],
              'area: weather': ['weather', 'rain', 'storm', 'fog', 'day/night'],
              'area: ui': ['hud', 'minimap', 'ui', 'menu', 'interface'],
            };

            for (const [label, keywords] of Object.entries(categories)) {
              if (keywords.some(k => text.includes(k))) {
                newLabels.push(label);
              }
            }

            if (newLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: newLabels
              });
            }

  welcome-contributor:
    name: Welcome New Contributors
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.issue.user.login;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator,
              state: 'all'
            });
            if (issues.data.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `Welcome to CongCraft, @${creator}! Thanks for opening your first issue. A maintainer will review it shortly.`
              });
            }

  # NOTE: Inline commands (Bug:, Feature:, /priority, /close, etc.) are handled
  # exclusively by issue-to-pr.yml to avoid creating duplicate issues.
  # Do NOT add command parsing here.
