name: Feedback Approved - Resume Development

on:
  issues:
    types: [closed]
  issue_comment:
    types: [created]

# Prevent double-fire when approval comment triggers close which triggers again
concurrency:
  group: feedback-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read
  actions: write

jobs:
  check-approval:
    name: Check Feedback Approval
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.title, '[FEEDBACK]')) ||
      (github.event_name == 'issue_comment' && contains(github.event.issue.title, '[FEEDBACK]'))
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue = context.payload.issue;

            // Prevent duplicate processing: if "Feedback Approved" comment already exists, skip
            const existingComments = await github.rest.issues.listComments({
              owner, repo,
              issue_number: issue.number
            });
            const alreadyProcessed = existingComments.data.some(c =>
              c.user.type === 'Bot' && c.body.includes('Feedback Approved')
            );
            if (alreadyProcessed) {
              core.info('Feedback already processed - skipping to prevent duplicates.');
              return;
            }

            // Check for thumbs-up reaction or explicit approval comment
            const reactions = await github.rest.reactions.listForIssue({
              owner, repo,
              issue_number: issue.number
            });

            const thumbsUp = reactions.data.filter(r => r.content === '+1');
            const repoOwner = context.repo.owner;
            const isOwnerApproval = thumbsUp.some(r => r.user.login === repoOwner);

            // Also check for approval keywords in comments
            let commentApproval = false;
            if (context.eventName === 'issue_comment') {
              const comment = context.payload.comment.body.toLowerCase();
              const isOwner = context.payload.comment.user.login === repoOwner;
              commentApproval = isOwner && (
                comment.includes('approved') ||
                comment.includes('lgtm') ||
                comment.includes('ship it') ||
                comment.includes('go ahead') ||
                comment.includes('weiter') ||
                comment.includes('passt') ||
                comment.includes('genehmigt') ||
                comment.includes('freigegeben')
              );
            }

            const isApproved = isOwnerApproval || commentApproval || issue.state === 'closed';

            if (isApproved) {
              core.info('Feedback approved! Resuming development.');

              // Clear the awaiting feedback flag
              try {
                await github.rest.actions.createOrUpdateRepoVariable({
                  owner, repo,
                  name: 'AWAITING_FEEDBACK',
                  value: 'false'
                });
              } catch (e) {
                core.info(`Could not update variable: ${e.message}`);
              }

              // Close the feedback issue if not already closed
              if (issue.state === 'open') {
                await github.rest.issues.update({
                  owner, repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
              }

              // Post confirmation
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issue.number,
                body: `## Feedback Approved :rocket:\n\nThank you for the review! Development cycle resumes.\n\nAny bugs or ideas mentioned in this thread will be converted to issues.`
              });

              // Parse feedback comments for new issues
              const comments = await github.rest.issues.listComments({
                owner, repo,
                issue_number: issue.number
              });

              // Fetch existing open issues to prevent duplicates
              const existingIssues = await github.rest.issues.listForRepo({
                owner, repo,
                state: 'all',
                per_page: 100
              });
              const existingTitles = new Set(existingIssues.data.map(i => i.title.toLowerCase()));

              for (const comment of comments.data) {
                if (comment.user.login === repoOwner && comment.user.type !== 'Bot') {
                  const lines = comment.body.split('\n');
                  for (const line of lines) {
                    // Auto-create issues from lines starting with "Bug:" or "Idea:" or "Feature:"
                    const bugMatch = line.match(/^(?:bug|fehler|problem):\s*(.+)/i);
                    const ideaMatch = line.match(/^(?:idea|idee|feature|vision):\s*(.+)/i);

                    if (bugMatch) {
                      const title = bugMatch[1].trim();
                      if (!existingTitles.has(title.toLowerCase())) {
                        await github.rest.issues.create({
                          owner, repo,
                          title,
                          body: `Auto-created from feedback on release.\n\nSource: #${issue.number}`,
                          labels: ['bug', 'needs-triage']
                        });
                        existingTitles.add(title.toLowerCase());
                      }
                    }

                    if (ideaMatch) {
                      const title = ideaMatch[1].trim();
                      if (!existingTitles.has(title.toLowerCase())) {
                        await github.rest.issues.create({
                          owner, repo,
                          title,
                          body: `Auto-created from feedback on release.\n\nSource: #${issue.number}`,
                          labels: ['enhancement', 'needs-triage']
                        });
                        existingTitles.add(title.toLowerCase());
                      }
                    }
                  }
                }
              }
            }
