name: Task
description: A development task or chore
title: "[Task]: "
labels: ["task"]
assignees: []
body:
  - type: dropdown
    id: type
    attributes:
      label: Task Type
      options:
        - Implementation
        - Refactoring
        - Documentation
        - Testing
        - DevOps / CI-CD
        - Performance
        - Cleanup
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Technical Notes
      description: Any implementation hints or constraints?
