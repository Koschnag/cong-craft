name: Bug Report
description: Report a bug or crash in CongCraft
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low - Cosmetic issue
        - Medium - Feature partially broken
        - High - Feature completely broken
        - Critical - Game crashes
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Game Area
      options:
        - Combat
        - Magic / Spells
        - Inventory / Equipment
        - Crafting
        - Quests / Dialogue
        - World Generation / Terrain
        - Dungeon
        - Weather / Day-Night
        - Save / Load
        - Rendering / Graphics
        - Audio
        - UI / HUD
        - Boss Fights
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start the game
        2. Go to...
        3. Do...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS ARM64 (M1/M2/M3)
        - macOS x64 (Intel)
        - Linux x64
        - Windows x64
        - Built from source
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant logs or screenshots
